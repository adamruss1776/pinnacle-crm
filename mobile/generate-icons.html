<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pinnacle CRM — Icon Generator</title>
<style>
  body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 24px; }
  canvas { border: 1px solid #444; border-radius: 8px; }
  button { padding: 12px 28px; background: #d4a843; color: #000; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { background: #e8bb55; }
  h2 { margin: 0; color: #d4a843; }
  .row { display: flex; gap: 40px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  label { font-size: 13px; color: #aaa; }
</style>
</head>
<body>
<h2>Pinnacle CRM — Icon Generator</h2>
<p style="color:#aaa;margin:0">Click the buttons below to download your icon and splash screen.</p>

<div class="row">
  <div class="col">
    <label>icon.png (1024×1024)</label>
    <canvas id="icon" width="1024" height="1024"></canvas>
    <button onclick="download('icon')">Download icon.png</button>
  </div>
  <div class="col">
    <label>splash.png (2048×2048)</label>
    <canvas id="splash" width="2048" height="2048" style="width:300px;height:300px"></canvas>
    <button onclick="download('splash')">Download splash.png</button>
  </div>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const gold = '#c9a84c';
  const dark = '#1a1208';
  const cream = '#f9f6f1';

  // Background
  ctx.fillStyle = cream;
  ctx.fillRect(0, 0, size, size);

  // Hexagon
  const hexR = size * 0.28;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30);
    const x = cx + hexR * Math.cos(angle);
    const y = cy * 0.92 + hexR * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = gold;
  ctx.lineWidth = size * 0.012;
  ctx.stroke();

  // Inner hexagon (thinner)
  const hexR2 = hexR * 0.82;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30);
    const x = cx + hexR2 * Math.cos(angle);
    const y = cy * 0.92 + hexR2 * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = gold;
  ctx.lineWidth = size * 0.004;
  ctx.stroke();

  // P letter
  ctx.fillStyle = gold;
  ctx.font = `300 ${size * 0.22}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('P', cx, cy * 0.92);

  // PINNACLE
  ctx.fillStyle = dark;
  ctx.font = `${size * 0.055}px Georgia, serif`;
  ctx.letterSpacing = `${size * 0.018}px`;
  ctx.fillText('PINNACLE', cx, cy * 1.38);

  // LUXURY AUTOMOTIVE GROUP
  ctx.fillStyle = gold;
  ctx.font = `300 ${size * 0.028}px Georgia, serif`;
  ctx.fillText('LUXURY AUTOMOTIVE GROUP', cx, cy * 1.52);

  // CRM box
  const boxW = size * 0.14, boxH = size * 0.052;
  const boxX = cx - boxW / 2, boxY = cy * 1.6;
  ctx.strokeStyle = dark;
  ctx.lineWidth = size * 0.004;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.fillStyle = dark;
  ctx.font = `${size * 0.028}px Georgia, serif`;
  ctx.fillText('CRM', cx, boxY + boxH / 2);
}

drawIcon(document.getElementById('icon'), 1024);
drawIcon(document.getElementById('splash'), 2048);

function download(id) {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = id + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
