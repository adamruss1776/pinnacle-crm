// ── JESSICA MATCH ENGINE ("The Hunter") ──────────────────────────────
// Scores a client's vehicle-of-interest against a vehicle in inventory, 0–100.
// 70 pts: how many meaningful words of what they want appear on this vehicle (make/model/trim).
// 30 pts: year — exact 30, one year off 20, two off 10. No year stated = no penalty.
const MATCH_STOPWORDS = new Set(['new','used','certified','cpo','awd','rwd','4dr','2dr','all-wheel','wheel','drive','coupe','sedan','suv','convertible','the']);
function scoreVehicleMatch(client, v) {
  const want = (client.vehicle_of_interest||'').toLowerCase();
  if (!want) return {score:0};
  const vText = [v.year,v.make,v.model,v.trim].filter(Boolean).join(' ').toLowerCase();
  if (!vText.trim()) return {score:0};
  const wantYear = (want.match(/\b(19|20)\d{2}\b/)||[])[0];
  const tokens = [...new Set(want.replace(/\b(19|20)\d{2}\b/g,' ').split(/[^a-z0-9\-]+/).filter(t=>t.length>1 && !MATCH_STOPWORDS.has(t)))];
  if (!tokens.length) return {score:0};
  const hits = tokens.filter(t=>vText.includes(t));
  let score = Math.round((hits.length/tokens.length)*70);
  if (wantYear && v.year) {
    const dy = Math.abs(Number(v.year)-Number(wantYear));
    score += dy===0?30:dy===1?20:dy===2?10:0;
  } else score += 30;
  return {score: Math.min(score,100), hits: hits.length, of: tokens.length};
}

// ── LEAD SCORING ───────────────────────────────────────────────────
const calcLeadScore = (client) => {
  if (!client || client.stage === 'Closed' || client.stage === 'Lost') return {score:0,heat:'none',color:'#6a5d4a',label:'—'};
  let score = 0;
  // Stage: Negotiating is the hottest active stage
  score += ({'New Lead':1,'Contacted':2,'Negotiating':4}[client.stage] || 0);
  // Recency — use updated_at if available, else created_at
  const lastActivity = client.updated_at || client.created_at;
  if (lastActivity) {
    const days = (Date.now() - new Date(lastActivity)) / 86400000;
    if (days < 1) score += 3;
    else if (days < 3) score += 2;
    else if (days < 7) score += 1;
  }
  // Intent signals
  if (client.vehicle_of_interest) score += 1;
  if (client.trade_year) score += 1;  // trade-in = serious buyer
  // Source quality
  if (['Referral','Walk-in'].includes(client.lead_source)) score += 1;
  score = Math.min(10, score);
  const heat = score >= 8 ? 'hot' : score >= 5 ? 'warm' : score >= 3 ? 'cool' : 'cold';
  const colors = {hot:'#f97316', warm:'#d4a843', cool:'#93c5fd', cold:'#6a5d4a'};
  const labels = {hot:'Hot', warm:'Warm', cool:'Cool', cold:'Cold'};
  return {score, heat, color:colors[heat], label:labels[heat]};
};

  const [selectedVehicle, setSelectedVehicle] = React.useState("");
  const [started, setStarted] = React.useState(false);
  const [handoff, setHandoff] = React.useState(false);
  const bottomRef = React.useRef(null);
  React.useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

  const startConvo = async (v) => {
    setSelectedVehicle(v); setStarted(true); setLoading(true);
    try {
      const res = await fetch("/.netlify/functions/jessica", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:AGENT_SYSTEM_PROMPT,messages:[{role:"user",content:`New lead interested in the ${v}. Send your opening message. Warm, genuine, subtle urgency. 2-3 sentences max.`}]})});

      setMessages([{role:"assistant",content:data.content?.[0]?.text||"Welcome to Pinnacle! So glad you reached out."}]);
    } catch { setMessages([{role:"assistant",content:"Welcome to Pinnacle! So glad you reached out."}]); }
    setLoading(false);
  };

  const sessionRef = React.useRef("s" + Date.now());
  const saveConvo = async(msgs, vehicle, extra) => {
    try {
      await sb.from("jessica_conversations").upsert({session_id:sessionRef.current,messages:msgs,vehicle_interest:vehicle,status:"active",updated_at:new Date().toISOString(),...extra},{onConflict:"session_id"});

    setMessages(newMsgs); setLoading(true);

function EmailDrafter({client, onClose}) {
  const [status, setStatus] = React.useState("idle"); // idle, loading, ready, copied
  const [draft, setDraft] = React.useState(null);
  const [error, setError] = React.useState(null);

  const generateDraft = async () => {
    setStatus("loading");
    setError(null);
    try {
      const res = await fetch("/.netlify/functions/draft-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setDraft(data);
      setStatus("ready");
    } catch(e) {
      setError("Couldn't generate draft — " + e.message);
      setStatus("idle");
    }
  };

  const copyToClipboard = (text) => {
    navigator.clipboard.writeText(text);
    setStatus("copied");
    setTimeout(() => setStatus("ready"), 2000);
  };

  const openEmail = () => {
    const subject = encodeURIComponent(draft.subject);
    const body = encodeURIComponent(draft.body);
    window.open(`mailto:${client.primary_email}?subject=${subject}&body=${body}`);
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

              {client.first_name} {client.last_name} — {client.vehicle_of_interest||"Vehicle Enquiry"}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--muted2)",fontSize:18,cursor:"pointer",padding:"4px 8px"}}>✕</button>
        </div>

        <div style={{padding:24}}>
          {status === "idle" && !draft && (
            <div style={{textAlign:"center",padding:"32px 0"}}>
              <div style={{fontSize:14,color:"var(--muted)",marginBottom:24,lineHeight:1.7}}>
                Jessica will draft a personalised first response email for {client.first_name} based on their vehicle interest and lead details. Review it before sending.
              </div>
              <button onClick={generateDraft} style={{padding:"12px 32px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.7)",borderRadius:4,color:gold,fontSize:12,letterSpacing:"0.25em",textTransform:"uppercase",cursor:"pointer"}}>
                ✦ Generate Draft
              </button>
            </div>
          )}

          {status === "loading" && (
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:16}}>
                {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:gold,animation:`fadeUp 1.2s ease-in-out ${i*0.2}s infinite`,opacity:0.6}} />)}
              </div>
              <div style={{fontSize:13,color:"var(--muted)"}}>Jessica is drafting your email…</div>
            </div>
          )}

          {error && (
            <div style={{padding:"12px 16px",background:"rgba(252,165,165,0.08)",border:"1px solid rgba(252,165,165,0.2)",borderRadius:4,color:"#fca5a5",fontSize:13,marginBottom:16}}>
              {error}
            </div>
          )}

          {draft && (status === "ready" || status === "copied") && (
            <div>
              {/* Subject */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:10,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:8}}>Subject Line</div>
                <div style={{padding:"12px 16px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:4,fontSize:14,color:"var(--text)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                  <span>{draft.subject}</span>
                  <button onClick={()=>copyToClipboard(draft.subject)} style={{background:"none",border:"none",color:"var(--muted2)",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",letterSpacing:"0.1em"}}>COPY</button>
                </div>

              {/* Body */}
              <div style={{marginBottom:24}}>
                <div style={{fontSize:10,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:8}}>Email Body</div>

        </div>
      </div>
    </div>
  );

// ── VIN CAMERA SCANNER (photo → OCR → VIN) ──────────────────────────
function VinScanButton({onVin}) {
  const fileRef = React.useRef(null);
  const [status, setStatus] = React.useState(null); // null | 'reading' | error text
  const vinCheckDigit = (vin) => {
    const map = {A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,J:1,K:2,L:3,M:4,N:5,P:7,R:9,S:2,T:3,U:4,V:5,W:6,X:7,Y:8,Z:9};
    const weights = [8,7,6,5,4,3,2,10,0,9,8,7,6,5,4,3,2];
    let sum = 0;
    for (let i=0;i<17;i++){ const c=vin[i]; const val=/[0-9]/.test(c)?Number(c):map[c]; if(val===undefined)return false; sum+=val*weights[i]; }
    const r = sum % 11;
    return vin[8] === (r===10?'X':String(r));
  };
  const extractVin = (text) => {
    // VINs never contain I, O or Q — fix the usual OCR mix-ups first
    const cleaned = (text||'').toUpperCase().replace(/[IOQ]/g, m => ({I:'1',O:'0',Q:'0'}[m]));
    const candidates = [];
    (cleaned.match(/[A-HJ-NPR-Z0-9]{17,25}/g) || []).forEach(run => {
      for (let i=0; i+17<=run.length; i++) candidates.push(run.slice(i,i+17));
    });
    return candidates.find(vinCheckDigit) || candidates[0] || null;
  };
  const handleFile = async (file) => {
    if (!file) return;
    if (!window.Tesseract) { setStatus('OCR library not loaded — check your connection and refresh the page.'); return; }
    setStatus('reading');
    try {
      const img = await new Promise((res, rej) => { const i = new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
      const scale = Math.min(1, 1800 / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      // grayscale + gentle contrast boost — helps read stamped VIN plates
      const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
      for (let i=0; i<d.data.length; i+=4) {
        const g = 0.299*d.data[i] + 0.587*d.data[i+1] + 0.114*d.data[i+2];
        const v = Math.max(0, Math.min(255, (g-128)*1.4 + 128));
        d.data[i] = d.data[i+1] = d.data[i+2] = v;
      }
      ctx.putImageData(d, 0, 0);
      const result = await window.Tesseract.recognize(canvas.toDataURL('image/png'), 'eng', { logger: ()=>{} });
      const vin = extractVin(result.data?.text);
      if (!vin) { setStatus("Couldn't find a VIN in that photo. Get closer, hold the phone level, and avoid glare."); return; }
      setStatus(null);
      onVin(vin);
    } catch(e) { setStatus('Scan failed — try again with better lighting.'); }
    finally { if (fileRef.current) fileRef.current.value = ''; }
  };
  return (
    <>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFile(e.target.files?.[0])} />
      <button type="button" onClick={()=>fileRef.current?.click()} disabled={status==='reading'}
        style={{padding:"11px 16px",background:status==='reading'?"rgba(201,168,76,0.05)":"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.55)",borderRadius:3,color:status==='reading'?"var(--dim2)":gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:status==='reading'?"wait":"pointer",whiteSpace:"nowrap"}}>
        {status==='reading' ? 'Reading…' : '📷 Scan'}
      </button>
      {status && status!=='reading' && <div style={{fontSize:11,color:"#fcd34d",flexBasis:"100%"}}>⚠ {status}</div>}
    </>
  );
}

// ── CLIENT FORM ────────────────────────────────────────────────────
function ClientForm({initial, onSave, onCancel, saving}) {
  const [f, setF] = useState(initial || emptyForm());
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  // One decoder for all three vehicles: purchase ('veh'), trade ('trade'), second trade ('trade2')
  const decodeVinInto = async (prefix, vinArg) => {
    const vin = (vinArg || f[prefix+'_vin'] || '').trim();
    if (vin.length !== 17) return;
    try {
      const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
      const d = await res.json();
      const get = v => d.Results?.find(r=>r.Variable===v)?.Value || '';
      const titleCase = (str) => (str||'').toLowerCase().replace(/\b\w/g, c=>c.toUpperCase());
      const yr = get("Model Year"), mk = titleCase(get("Make")), md = get("Model"), tr = get("Trim")||get("Series")||'';
      s(prefix+"_year",yr); s(prefix+"_make",mk);
      s(prefix+"_model",md); s(prefix+"_trim",tr);
      // Purchase vehicle also fills the display name used across the CRM
      if (prefix === 'veh') {
        const label = [yr, mk, md].filter(Boolean).join(' ');
        if (label) s("vehicle_of_interest", label);
      }
    } catch(e){}

// ── QUICK TEXTS (tap-to-send from your own phone) ───────────────────
function QuickTexts({client}) {

  const canText = client.cell && !client.do_not_text;
  const templates = getTextTemplates(settings);
  return (
    <div style={{marginBottom:28}}>

        {templates.map(t => {
          const needsReview = t.body.includes('{review_link}') && !settings.review_url;

            : <button key={t.id} onClick={()=>flash(why)} style={{padding:"9px 16px",background:"transparent",border:"1px solid var(--w06)",borderRadius:3,color:"var(--dim2)",fontSize:12,letterSpacing:"0.12em",textTransform:"uppercase",cursor:"pointer"}}>{t.label}</button>;

  );
}

// ── VIN → INVENTORY LOOKUP (client detail) ──────────────────────────
function VinInventoryLookup({inventory, client, onAttach}) {
  const [vin, setVin] = React.useState('');
  const [result, setResult] = React.useState(null); // vehicle object | 'notfound' | 'short'
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const lookup = (raw) => {
    const q = (typeof raw === 'string' ? raw : vin).trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    setSaved(false);
    if (q.length < 6) { setResult('short'); return; }
    const match = inventory.find(v => (v.vin||'').trim().toUpperCase() === q)
      || inventory.find(v => (v.vin||'').trim().toUpperCase().endsWith(q));
    setResult(match || 'notfound');
  };
  const attach = async () => {
    if (!result || typeof result === 'string') return;
    setSaving(true);
    const name = [result.year, result.make, result.model, result.trim].filter(Boolean).join(' ');
    await onAttach({ vehicle_of_interest: name });
    setSaving(false); setSaved(true);
  };
  return (
    <div style={{marginBottom:24}}>
      <GLine label="VIN Lookup — Pull From Inventory" />
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <input value={vin} onChange={e=>setVin(e.target.value.toUpperCase())} maxLength={17}
          placeholder="Full VIN or last 8…" onKeyDown={e=>{if(e.key==='Enter')lookup();}}
          style={{flex:1,minWidth:160,padding:"10px 13px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,fontFamily:"monospace",letterSpacing:"0.05em"}} />
        <VinScanButton onVin={(v)=>{ setVin(v); lookup(v); }} />
        <button onClick={()=>lookup()} style={{padding:"10px 18px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer",whiteSpace:"nowrap"}}>Find ✦</button>
      </div>
      {result === 'short' && <div style={{fontSize:12,color:"#fcd34d"}}>⚠ Enter at least the last 6 characters of the VIN.</div>}
      {result === 'notfound' && <div style={{fontSize:12,color:"#fcd34d"}}>⚠ No vehicle with that VIN in current inventory. Sync your inventory file or check the VIN.</div>}
      {result && typeof result !== 'string' && (
        <div style={{padding:"12px 14px",background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.42)",borderRadius:3,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:14,color:"var(--text)"}}>{result.year} {result.make} {result.model} {result.trim}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>
              {[result.color, result.mileage?`${Number(result.mileage).toLocaleString()} mi`:null, result.store, result.vin].filter(Boolean).join(' · ')}
            </div>
            {result.price && <div style={{fontSize:15,color:gold,fontFamily:"'Cormorant Garamond',serif",marginTop:3}}>${Number(result.price).toLocaleString()}</div>}
          </div>
          {saved
            ? <span style={{fontSize:12,color:"#6ee7b7"}}>✓ Saved to profile</span>
            : <button onClick={attach} disabled={saving} style={{padding:"9px 16px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.7)",borderRadius:3,color:gold,fontSize:11,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>{saving?"Saving…":"Set as Vehicle of Interest"}</button>}
        </div>
      )}
    </div>
  );
}

function ApprovedNotifier({client, onClose}) {

// ── CLIENT DETAIL ──────────────────────────────────────────────────

  const [showDesk, setShowDesk] = React.useState(false);

  const loadQuotes = () => sb.from('quotes').select('*').eq('client_id', client.id).order('created_at',{ascending:false}).then(({data})=>setQuotes(data||[]));
  React.useEffect(() => { loadQuotes(); }, [client.id]);
  const [showApproved, setShowApproved] = React.useState(false);
  const inventory = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('pinnacle_inventory') || '[]'); } catch { return []; }
  }, []);
  const invMatches = React.useMemo(() => {
    if (!client.vehicle_of_interest || inventory.length === 0) return [];
    const keywords = client.vehicle_of_interest.toLowerCase().split(/\s+/).filter(w => w.length > 3 && !/^\d+$/.test(w));
    if (!keywords.length) return [];
    return inventory.filter(v => {
      const vText = `${v.year} ${v.make} ${v.model} ${v.trim}`.toLowerCase();

    }).slice(0, 4);

  function Row({label, value}) {

    return (

        <span style={{fontSize:11,color:"var(--muted2)",letterSpacing:"0.15em",textTransform:"uppercase"}}>{label}</span>

      <div style={{marginBottom:28}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:6,flexWrap:"wrap"}}>
          <h1 style={{fontSize:34,color:"var(--text)"}}>{client.first_name} {client.last_name}</h1>

        {(()=>{const {score,heat,color}=calcLeadScore(client);if(heat==='none')return null;const reasons=[];if(['Negotiating','Contacted'].includes(client.stage))reasons.push(client.stage+' stage');if(client.vehicle_of_interest)reasons.push('vehicle identified');if(client.trade_year)reasons.push('trade-in on file');if(['Referral','Walk-in'].includes(client.lead_source))reasons.push(client.lead_source+' lead');const lastActivity=client.updated_at||client.created_at;if(lastActivity){const d=Math.floor((Date.now()-new Date(lastActivity))/86400000);if(d<3)reasons.push('active recently');}return reasons.length>0?(<div style={{fontSize:11,color:"var(--dim2)",marginTop:4}}>Score {score}/10 &mdash; {reasons.join(' · ')}</div>):null;})()}

// ── JESSICA SOURCING — live "find me this car" search ────────────────
function SourcingView({onNewLead}) {
  const [q, setQ] = React.useState('');
  const [budget, setBudget] = React.useState('');
  const [results, setResults] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [freshness, setFreshness] = React.useState(null);
  const invRef = React.useRef(null);

  const load = async () => {
    let local = []; try { local = JSON.parse(localStorage.getItem('pinnacle_inventory')||'[]'); } catch {}
    const { data: remote } = await sb.from('store_inventory').select('*');
    const localVins = new Set(local.map(v=>(v.vin||'').trim().toUpperCase()).filter(Boolean));
    const merged = [
      ...local.map(v=>({...v, store: v.store || 'Fields Motorcars Orlando'})),
      ...(remote||[]).filter(v=>!localVins.has((v.vin||'').trim().toUpperCase()))
    ];
    invRef.current = merged;
    const newest = (remote||[]).reduce((mx,v)=>Math.max(mx, v.last_seen?Date.parse(v.last_seen):0), 0);
    if (newest) setFreshness(newest);
    return merged;
  };

  const search = async (deepScan) => {
    if (!q.trim()) return;
    setBusy(true);
    try {
      if (deepScan) { try { await fetch('/.netlify/functions/store-scan'); } catch {} invRef.current = null; }
      const inventory = invRef.current || await load();
      const max = parseFloat(budget.replace(/[^0-9.]/g,'')) || null;
      const probe = { vehicle_of_interest: q };
      const scored = inventory
        .map(v => ({ v, score: scoreVehicleMatch(probe, v).score }))
        .filter(x => x.score >= 50 && (!max || !x.v.price || Number(x.v.price) <= max))
        .sort((a,b) => b.score - a.score)
        .slice(0, 12);
      setResults(scored);
    } finally { setBusy(false); }
  };

  const tier = (s) => s>=90 ? {label:"Strong Match", color:"#6ee7b7"} : s>=70 ? {label:"Close", color:"var(--gold)"} : {label:"Stretch", color:"var(--dim)"};

  return (
    <div style={{maxWidth:680,paddingBottom:60}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>Jessica ✦ Vehicle Sourcing</div>
        <h1 style={{fontSize:30,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Find a Vehicle</h1>
        <div style={{fontSize:13,color:"var(--muted)",marginTop:6}}>Type what the client wants — Jessica checks your lot and all five group stores instantly.</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')search(false);}}
          placeholder='e.g. "2024 Rolls-Royce Cullinan Black Badge" or "Bentley GT Speed"'
          style={{width:"100%",padding:"15px 16px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.42)",borderRadius:4,color:"var(--text)",fontSize:16}} />
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input value={budget} onChange={e=>setBudget(e.target.value)} placeholder="Max budget (optional)" inputMode="numeric"
            style={{flex:1,minWidth:140,padding:"12px 14px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:4,color:"var(--text)",fontSize:14}} />
          <button onClick={()=>search(false)} disabled={busy||!q.trim()} style={{padding:"12px 26px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:4,color:gold,fontSize:13,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer",fontWeight:600}}>
            {busy?"Searching…":"✦ Search"}
          </button>
          <button onClick={()=>search(true)} disabled={busy||!q.trim()} title="Re-scans the five store websites first (~20s), then searches"
            style={{padding:"12px 18px",background:"rgba(110,231,183,0.08)",border:"1px solid rgba(110,231,183,0.4)",borderRadius:4,color:"#6ee7b7",fontSize:12,letterSpacing:"0.14em",textTransform:"uppercase",cursor:"pointer"}}>
            🌐 Deep Scan
          </button>
        </div>
        {freshness && <div style={{fontSize:11,color:"var(--dim2)"}}>Group store data last scanned {new Date(freshness).toLocaleString()} — Deep Scan refreshes it live.</div>}
      </div>

      {results !== null && results.length === 0 && (
        <div style={{padding:"22px 20px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:4,fontSize:13,color:"var(--muted)",lineHeight:1.7}}>
          Nothing in the group matches that yet. Jessica will keep watching — save it as a lead with the vehicle of interest and the Hunter will alert you the moment one lands at any store.
          <div style={{marginTop:12}}>
            <button onClick={()=>onNewLead&&onNewLead(q)} style={{padding:"10px 20px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>+ Save as Lead</button>
          </div>
        </div>
      )}

      {results && results.length > 0 && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {results.map(({v,score},i)=>{
            const t = tier(score);
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:"var(--surface)",border:`1px solid ${score>=90?"rgba(110,231,183,0.45)":"rgba(201,168,76,0.3)"}`,borderRadius:4,flexWrap:"wrap"}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:`${score>=90?"rgba(110,231,183,0.12)":"rgba(201,168,76,0.12)"}`,border:`1px solid ${t.color}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,color:t.color,fontWeight:600}}>{score}%</div>
                <div style={{flex:1,minWidth:170}}>
                  <div style={{fontSize:15,color:"var(--text)"}}>{[v.year,v.make,v.model,v.trim].filter(Boolean).join(' ')}</div>
                  <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>

                </div>

          </div>
        </div>
      )}
    </div>
  );
}

// ── JESSICA ALERTS — THE HUNTER (dashboard panel) ────────────────────
function JessicaAlerts({clients, onSelectClient}) {
  const [settings] = useSettings();
  const sig = settings.rep_name || '';
  const localInv = React.useMemo(()=>{ try { return JSON.parse(localStorage.getItem('pinnacle_inventory')||'[]'); } catch { return []; } },[]);
  const [groupInv, setGroupInv] = React.useState([]);
  React.useEffect(()=>{
    sb.from('store_inventory').select('*').then(({data})=>{ if(data) setGroupInv(data); });
  },[]);
  const inventory = React.useMemo(()=>{
    const localVins = new Set(localInv.map(v=>(v.vin||'').trim().toUpperCase()).filter(Boolean));
    return [...localInv, ...groupInv.filter(v=>!localVins.has((v.vin||'').trim().toUpperCase()))];
  },[localInv, groupInv]);
  const drops = React.useMemo(()=>{
    let local = []; try { const d = JSON.parse(localStorage.getItem('pinnacle_price_drops')||'[]'); const cutoff = Date.now()-14*86400000; local = d.filter(x=>x.at>cutoff); } catch {}
    const cutoff = Date.now()-14*86400000;
    const remote = groupInv
      .filter(v=>v.price_dropped_at && new Date(v.price_dropped_at).getTime()>cutoff && v.prev_price && v.price)
      .map(v=>({ vin:v.vin, name:[v.year,v.make,v.model,v.trim].filter(Boolean).join(' '), year:v.year, make:v.make, model:v.model, trim:v.trim, store:v.store, oldPrice:Number(v.prev_price), newPrice:Number(v.price), drop:Number(v.prev_price)-Number(v.price), at:new Date(v.price_dropped_at).getTime() }));
    return [...local, ...remote];
  },[groupInv]);
  const active = React.useMemo(()=>clients.filter(c=>c.stage!=='Closed'&&c.stage!=='Lost'),[clients]);

  const matches = React.useMemo(()=>{
    const out = [];
    active.forEach(c => inventory.forEach(v => {
      const m = scoreVehicleMatch(c, v);
      if (m.score >= 90) out.push({c, v, score: m.score});
    }));
    return out.sort((a,b)=>b.score-a.score).slice(0,8);
  },[active, inventory]);

  const revivals = React.useMemo(()=>{
    const out = [];
    drops.forEach(d => active.forEach(c => {
      const m = scoreVehicleMatch(c, d);
      if (m.score >= 70) {
        const daysCold = Math.floor((Date.now()-new Date(c.updated_at||c.created_at))/86400000);
        out.push({c, d, score: m.score, daysCold});
      }
    }));
    return out.sort((a,b)=>b.daysCold-a.daysCold).slice(0,8);
  },[active, drops]);

  if (matches.length===0 && revivals.length===0) return null;

  const rowStyle = {display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.22)",borderRadius:3,marginBottom:6,flexWrap:"wrap"};
  const TextBtn = ({client, body}) => (client.cell && !client.do_not_text)
    ? <a href={smsHref(client.cell, body)} style={{padding:"7px 14px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",textDecoration:"none",whiteSpace:"nowrap"}}>💬 Text</a>
    : <span style={{fontSize:10,color:"var(--dim2)"}}>{!client.cell?"no cell":"do not text"}</span>;

  return (
    <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.42)",borderRadius:4,padding:18,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{fontSize:10,letterSpacing:"0.35em",color:gold,textTransform:"uppercase"}}>✦ Jessica Alerts</div>
        <div style={{fontSize:10,color:"var(--muted)"}}>{matches.length>0?`${matches.length} match${matches.length!==1?'es':''} found`:''}{matches.length>0&&revivals.length>0?' · ':''}{revivals.length>0?`${revivals.length} price-drop revival${revivals.length!==1?'s':''}`:''}</div>
      </div>
      {matches.map(({c,v,score},i)=>{
        const vehName = [v.year,v.make,v.model,v.trim].filter(Boolean).join(' ');
        const body = `Hi ${c.first_name||''}, great news — I found the ${vehName} you've been looking for${v.store?` at ${v.store}`:''}!${v.price?` Priced at $${Number(v.price).toLocaleString()}.`:''} These don't sit long — want me to send you the details or set up a time to see it?${sig?` — ${sig}`:''}`;
        return (
          <div key={'m'+i} style={rowStyle}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(110,231,183,0.12)",border:"1px solid rgba(110,231,183,0.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:10,color:"#6ee7b7",fontWeight:600}}>{score}%</div>
            <div style={{flex:1,minWidth:180}}>
              <div style={{fontSize:13,color:"var(--text)"}}><span style={{cursor:"pointer",textDecoration:"underline",textDecorationColor:"rgba(201,168,76,0.4)"}} onClick={()=>onSelectClient&&onSelectClient(c)}>{c.first_name} {c.last_name}</span> wants: <span style={{fontStyle:"italic",color:"var(--muted)"}}>{c.vehicle_of_interest}</span></div>
              <div style={{fontSize:12,color:gold,marginTop:2}}>Found: {vehName}{v.store?` · ${v.store}`:''}{v.price?` · $${Number(v.price).toLocaleString()}`:''}</div>
            </div>
            <TextBtn client={c} body={body} />
          </div>
        );
      })}
      {revivals.map(({c,d,daysCold},i)=>{
        const body = `Hi ${c.first_name||''}, heads up — the ${d.name} you were interested in just dropped from $${Number(d.oldPrice).toLocaleString()} to $${Number(d.newPrice).toLocaleString()} (that's $${Number(d.drop).toLocaleString()} off). If the numbers were the holdup, now might be the moment. Want the details?${sig?` — ${sig}`:''}`;
        return (
          <div key={'r'+i} style={rowStyle}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(252,211,77,0.1)",border:"1px solid rgba(252,211,77,0.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>📉</div>
            <div style={{flex:1,minWidth:180}}>
              <div style={{fontSize:13,color:"var(--text)"}}><span style={{cursor:"pointer",textDecoration:"underline",textDecorationColor:"rgba(201,168,76,0.4)"}} onClick={()=>onSelectClient&&onSelectClient(c)}>{c.first_name} {c.last_name}</span>{daysCold>=5&&<span style={{fontSize:10,color:"#fca5a5",marginLeft:8,textTransform:"uppercase",letterSpacing:"0.1em"}}>cold {daysCold}d</span>}</div>
              <div style={{fontSize:12,color:"#fcd34d",marginTop:2}}>{d.name} dropped ${Number(d.drop).toLocaleString()} → ${Number(d.newPrice).toLocaleString()}{d.store?` · ${d.store}`:''}</div>
            </div>
            <TextBtn client={c} body={body} />
          </div>
        );
      })}
    </div>
  );
}

// ── JESSICA INBOX ──────────────────────────────────────────────────
function JessicaInbox({onPushToClient}) {
  const [convos, setConvos] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(()=>{ load(); },[]);
  const load = async()=>{
    setLoading(true);
    const {data}=await sb.from("jessica_conversations").select("*").order("updated_at",{ascending:false});
    setConvos(data||[]); setLoading(false);
