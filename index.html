function QuickActions({client, invMatch}) {
  const [settings] = useSettings();
  const [toast, setToast] = useState(null);
  const flash = (m) => { setToast(m); setTimeout(()=>setToast(null), 3200); };
  const canCall = client.cell && !client.do_not_call;
  const canText = client.cell && !client.do_not_text;
  const vin = (invMatch?.vin || client.trade_vin || '').trim();
  const vehName = invMatch ? [invMatch.year,invMatch.make,invMatch.model,invMatch.trim].filter(Boolean).join(' ') : (client.vehicle_of_interest || 'the vehicle');
  const sig = [settings.rep_name, settings.dealership_name].filter(Boolean).join(', ');
  const myInfoBody = `Hi ${client.first_name||''}, it was a pleasure speaking with you. Here's my contact info — save me in your phone!\n\n${[settings.rep_name, settings.rep_title, settings.dealership_name, settings.rep_phone && ('Cell: '+settings.rep_phone), settings.rep_email].filter(Boolean).join('\n')}`;
  const dealerLink = (settings.inventory_url||'').includes('{vin}') && vin ? settings.inventory_url.replace('{vin}', vin) : (settings.inventory_url||'');
  const canEmail = client.primary_email && !client.do_not_email;
  const wireBody = `Hi ${client.first_name||''},\n\nHere are the wire transfer instructions for your purchase of ${vehName}:\n\n${settings.wire_instructions || '[Wire details not set up yet — add them in Settings, bottom of the sidebar]'}\n\nImportant: for your security, please call me directly to verify these details before sending any funds. We will never change wire instructions over email.${sig?`\n\n— ${sig}`:''}${settings.rep_phone?`\n${settings.rep_phone}`:''}`;
  const essentialsBody = `Hi ${client.first_name||''},\n\nCongratulations on your approval! To make delivery day quick and smooth, please have these three things ready:\n\n1. Valid driver's license — current, not expired.\n2. Proof of full coverage insurance — with your new vehicle (${vehName}) added to the policy.\n3. Down payment — cashier's check or wire transfer only. Personal checks and cash cannot be accepted.\n\nOnce you have these lined up, reply to this email or give me a call and we'll schedule your delivery.\n\nLooking forward to handing you the keys!${sig?`\n\n— ${sig}`:''}${settings.rep_phone?`\n${settings.rep_phone}`:''}`;
  const actions = [
    { label:"📞 Call", ok: canCall, href: telHref(client.cell), why: !client.cell ? "No cell number on file." : "Client is marked Do Not Call." },
    { label:"💬 Text", ok: canText, href: smsHref(client.cell, `Hi ${client.first_name||''}, `), why: !client.cell ? "No cell number on file." : "Client is marked Do Not Text." },
    { label:"Carfax", ok: canText && !!vin, href: smsHref(client.cell, `Hi ${client.first_name||''}, here's the Carfax history report on the ${vehName}: ${carfaxUrl(vin)}${sig?`\n— ${sig}`:''}`), why: !vin ? "No VIN found — add this vehicle to Inventory or enter a trade VIN." : (!client.cell ? "No cell number on file." : "Client is marked Do Not Text.") },
    { label:"Vehicle", ok: canText && !!invMatch, href: invMatch ? smsHref(client.cell, `Hi ${client.first_name||''}, here are the details on the ${vehName}:${invMatch.color?`\nColor: ${invMatch.color}`:''}${invMatch.mileage?`\nMileage: ${Number(invMatch.mileage).toLocaleString()} mi`:''}${invMatch.price?`\nPrice: $${Number(invMatch.price).toLocaleString()}`:''}${invMatch.vin?`\nVIN: ${invMatch.vin}`:''}${sig?`\n— ${sig}`:''}`) : '#', why: !invMatch ? "No matching vehicle in Inventory — add it there first." : (!client.cell ? "No cell number on file." : "Client is marked Do Not Text.") },
    { label:"Dealer Link", ok: canText && !!dealerLink, href: smsHref(client.cell, `Hi ${client.first_name||''}, here's the ${vehName} on our website: ${dealerLink}${sig?`\n— ${sig}`:''}`), why: !dealerLink ? "Add your Dealer Inventory Link in Settings (bottom of the sidebar)." : (!client.cell ? "No cell number on file." : "Client is marked Do Not Text.") },
    { label:"My Info", ok: canText && !!(settings.rep_name||settings.rep_phone), href: smsHref(client.cell, myInfoBody), why: !(settings.rep_name||settings.rep_phone) ? "Add your name and cell in Settings (bottom of the sidebar)." : (!client.cell ? "No cell number on file." : "Client is marked Do Not Text.") },
    { label:"✉ Wire Info", ok: canEmail && !!settings.wire_instructions, href: mailHref(client.primary_email, `Wire Transfer Instructions${settings.dealership_name?` — ${settings.dealership_name}`:''}`, wireBody), why: !settings.wire_instructions ? "Add your Wire Transfer Instructions in Settings (bottom of the sidebar)." : (!client.primary_email ? "No email on file." : "Client is marked Do Not Email.") },
    { label:"✉ Essentials", ok: canEmail, href: mailHref(client.primary_email, `You're Approved — What You'll Need for Delivery Day`, essentialsBody), why: !client.primary_email ? "No email on file." : "Client is marked Do Not Email." },
  ];
  return (
    <div style={{marginBottom:28}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {actions.map(a => a.ok
          ? <a key={a.label} href={a.href} style={{padding:"9px 16px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.14em",textTransform:"uppercase",textDecoration:"none",cursor:"pointer"}}>{a.label}</a>
          : <button key={a.label} onClick={()=>flash(a.why)} style={{padding:"9px 16px",background:"transparent",border:"1px solid var(--w06)",borderRadius:3,color:"var(--dim2)",fontSize:12,letterSpacing:"0.14em",textTransform:"uppercase",cursor:"pointer"}}>{a.label}</button>
        )}
      </div>
      {toast && <div style={{marginTop:10,fontSize:12,color:"#fcd34d"}}>⚠ {toast}</div>}
    </div>
  );
}

// ── FORMS — DEAL PAPERWORK ──────────────────────────────────────────
function FormsView() {
  const [cats, setCats] = useState([]);
  const [forms, setForms] = useState([]);
  const [sel, setSel] = useState(null);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [showAddCat, setShowAddCat] = useState(false);
  const [newCat, setNewCat] = useState("");
  const [editRecall, setEditRecall] = useState(false);
  const [recallDraft, setRecallDraft] = useState("");
  const [confirmDelCat, setConfirmDelCat] = useState(false);
  const fileRef = React.useRef(null);

  const load = async () => {
    const [{data:c},{data:f}] = await Promise.all([
      sb.from('form_categories').select('*').order('sort').order('created_at'),
      sb.from('forms').select('*').order('sort').order('created_at'),
    ]);
    setCats(c||[]); setForms(f||[]);
    setSel(prev => prev && (c||[]).some(x=>x.id===prev) ? prev : (c?.[0]?.id || null));
    setLoading(false);
  };
  useEffect(()=>{ load(); }, []);

  const cat = cats.find(c=>c.id===sel);
  const catForms = forms.filter(f=>f.category_id===sel);

  const upload = async (files) => {
    if (!sel || !files?.length) return;
    setUploading(true);
    for (const file of files) {
      const path = `${sel}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._\-]/g,'_')}`;
      const { error } = await sb.storage.from('forms').upload(path, file);
      if (!error) await sb.from('forms').insert([{ category_id: sel, name: file.name.replace(/\.pdf$/i,''), storage_path: path }]);
      else alert('Upload failed: ' + error.message);
    }
    await load(); setUploading(false);
  };
  const openForm = (f) => {
    const { data } = sb.storage.from('forms').getPublicUrl(f.storage_path);
    window.open(data.publicUrl, '_blank');
  };
  const delForm = async (f) => {
    if (!window.confirm(`Remove "${f.name}"?`)) return;
    await sb.storage.from('forms').remove([f.storage_path]);
    await sb.from('forms').delete().eq('id', f.id);
    load();
  };
  const addCategory = async () => {
    const name = newCat.trim(); if (!name) return;
    const { data } = await sb.from('form_categories').insert([{ name, sort: cats.length + 1 }]).select().single();
    setNewCat(""); setShowAddCat(false); await load(); if (data) setSel(data.id);
  };
  const delCategory = async () => {
    const paths = catForms.map(f=>f.storage_path);
    if (paths.length) await sb.storage.from('forms').remove(paths);
    await sb.from('form_categories').delete().eq('id', sel);
    setConfirmDelCat(false); load();
  };
  const saveRecall = async () => {
    await sb.from('form_categories').update({ recall_url: recallDraft.trim() }).eq('id', sel);
    setEditRecall(false); load();
  };

  return (
    <div style={{maxWidth:760,paddingBottom:60}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>One-Stop Shop</div>
        <h1 style={{fontSize:30,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Deal Paperwork</h1>
      </div>
      {loading ? <div style={{color:"var(--dim3)",padding:"40px 0",textAlign:"center"}}>Loading…</div> : <>
      {/* Category selector */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:220}}>
          <Lbl>Worksheet Type</Lbl>
          <select value={sel||''} onChange={e=>{setSel(e.target.value);setEditRecall(false);setConfirmDelCat(false);}}
            style={{width:"100%",padding:"12px 14px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:"var(--text)",fontSize:14,cursor:"pointer"}}>
            {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:8,paddingTop:20}}>
          <button onClick={()=>setShowAddCat(v=>!v)} style={{padding:"11px 16px",background:"rgba(201,168,76,0.18)",border:"1px solid rgba(201,168,76,0.55)",borderRadius:3,color:gold,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>+ Add Type</button>
          {cat && (!confirmDelCat
            ? <button onClick={()=>setConfirmDelCat(true)} style={{padding:"11px 14px",background:"transparent",border:"1px solid rgba(252,165,165,0.2)",borderRadius:3,color:"#fca5a5",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Delete</button>
            : <button onClick={delCategory} style={{padding:"11px 14px",background:"rgba(252,165,165,0.1)",border:"1px solid rgba(252,165,165,0.4)",borderRadius:3,color:"#fca5a5",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Confirm?</button>)}
        </div>
      </div>
      {showAddCat && (
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCategory()} placeholder="New worksheet type (e.g. Lease Return)…" autoFocus
            style={{flex:1,padding:"10px 13px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:"var(--text)",fontSize:13}} />
          <button onClick={addCategory} style={{padding:"10px 18px",background:"rgba(201,168,76,0.3)",border:"1px solid rgba(201,168,76,0.7)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>Add</button>
        </div>
      )}
      {/* Recall link for this brand */}
      {cat && (
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:22,padding:"12px 16px",background:"rgba(201,168,76,0.04)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:4,flexWrap:"wrap"}}>
          <span style={{fontSize:10,letterSpacing:"0.25em",color:gold,textTransform:"uppercase"}}>Recalls</span>
          {!editRecall ? <>
            {cat.recall_url
              ? <a href={cat.recall_url} target="_blank" rel="noreferrer" style={{fontSize:13,color:"var(--text)",textDecoration:"underline",textDecorationColor:"rgba(201,168,76,0.7)"}}>Open recall lookup ↗</a>
              : <span style={{fontSize:12,color:"var(--muted)"}}>No recall link yet for {cat.name}.</span>}
            <button onClick={()=>{setRecallDraft(cat.recall_url||'');setEditRecall(true);}} style={{marginLeft:"auto",padding:"6px 12px",background:"transparent",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:gold,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>{cat.recall_url?'Edit':'Add Link'}</button>
          </> : <>
            <input value={recallDraft} onChange={e=>setRecallDraft(e.target.value)} placeholder="https://…" style={{flex:1,minWidth:200,padding:"8px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:"var(--text)",fontSize:12}} />
            <button onClick={saveRecall} style={{padding:"8px 14px",background:"rgba(201,168,76,0.3)",border:"1px solid rgba(201,168,76,0.7)",borderRadius:3,color:gold,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Save</button>
          </>}
        </div>
      )}
      {/* Paperwork list */}
      {catForms.length === 0 && <div style={{textAlign:"center",padding:"36px 0",color:"var(--muted)",fontSize:13}}>No paperwork in {cat?.name||'this type'} yet — add your first PDF below.</div>}
      {catForms.map(f => (
        <div key={f.id} className="fu" style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:4,marginBottom:8}}>
          <span style={{fontSize:18}}>📄</span>
          <span style={{flex:1,fontSize:14,color:"var(--text)"}}>{f.name}</span>
          <button onClick={()=>openForm(f)} style={{padding:"8px 16px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>Open / Print ↗</button>
          <button onClick={()=>delForm(f)} style={{background:"none",border:"none",color:"var(--dim2)",cursor:"pointer",fontSize:15,padding:4}}>✕</button>
        </div>
      ))}
      {/* Upload */}
      {cat && (
        <div onClick={()=>fileRef.current?.click()}
          onDragOver={e=>e.preventDefault()}
          onDrop={e=>{e.preventDefault();upload([...e.dataTransfer.files].filter(f=>f.type==='application/pdf'||f.type.startsWith('image/')||f.name.match(/\.docx?$/i)));}}
          style={{marginTop:14,border:"2px dashed rgba(201,168,76,0.5)",borderRadius:6,padding:"26px 20px",textAlign:"center",cursor:"pointer",background:"var(--w02)"}}>
          <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,image/*" multiple style={{display:"none"}} onChange={e=>{upload([...e.target.files]);e.target.value='';}} />
          <div style={{fontSize:13,color:"var(--text)"}}>{uploading ? "Uploading…" : `+ Add paperwork to ${cat.name}`}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>Drop PDFs here or click to browse — available on every device</div>
        </div>
      )}
      </>}
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("dashboard");
  const [clients, setClients] = useState([]);
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState("");
  const [stageFilter, setStageFilter] = useState("All");
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('pinnacle_dark') === '1');
  const [clientPrefill, setClientPrefill] = useState(null);
  const [prefillKey, setPrefillKey] = useState(0);
  const [showSettings, setShowSettings] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const isSetup = SUPABASE_URL === "YOUR_SUPABASE_URL";

  useEffect(() => {
    if (darkMode) document.documentElement.setAttribute('data-dark', '');
    else document.documentElement.removeAttribute('data-dark');
  }, [darkMode]);

  const toggleDark = () => setDarkMode(d => {
    const v = !d;
    localStorage.setItem('pinnacle_dark', v ? '1' : '0');
    return v;
  });

  useEffect(() => { if (!isSetup) fetch(); else setLoading(false); }, []);

  async function fetch() {
    setLoading(true);
    const { data } = await sb.from("clients").select("*").order("created_at",{ascending:false});
    setClients(data||[]);
    setLoading(false);
  }

  async function handleSave(form) {
    setSaving(true);
    if (view==="edit" && selected) {
      await sb.from("clients").update(form).eq("id",selected.id);
      setSelected({...selected,...form});
      setView("detail");
    } else {
      const { data } = await sb.from("clients").insert([form]).select().single();
      if (data) { setSelected(data); setView("detail"); } // land on the client page so quick-sends are one tap away
      else setView("list");
      setClientPrefill(null);
    }
    await fetch();
    setSaving(false);
  }

  async function handleQuickUpdate(patch) {
    await sb.from("clients").update(patch).eq("id", selected.id);
    setSelected(prev => ({...prev, ...patch}));
    await fetch();
  }

  async function handleDelete() {
    await sb.from("clients").delete().eq("id",selected.id);
    await fetch();
    setView("list");
    setSelected(null);
  }

  if (isSetup) return <Setup />;

  const filtered = clients.filter(c => {
    const q = search.toLowerCase();
    const ms = !q || `${c.first_name} ${c.last_name} ${c.cell} ${c.primary_email} ${c.vehicle_of_interest}`.toLowerCase().includes(q);
    const mst = stageFilter==="All" || c.stage===stageFilter;
    return ms && mst;
  });

  const counts = STAGES.reduce((a,s)=>({...a,[s]:clients.filter(c=>c.stage===s).length}),{});

  const nav = (v) => { setView(v); setSelected(null); setMenuOpen(false); };

  return (
    <div style={{minHeight:"100vh",display:"flex"}}>
      {/* MOBILE TOP BAR */}
      {isMobile && (
        <div style={{position:"fixed",top:0,left:0,right:0,height:54,background:"var(--sidebar-bg)",borderBottom:"1px solid rgba(201,168,76,0.34)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",zIndex:20}}>
          <button onClick={()=>setMenuOpen(true)} style={{background:"none",border:"1px solid rgba(201,168,76,0.55)",borderRadius:3,color:gold,fontSize:16,padding:"6px 12px",cursor:"pointer"}}>☰</button>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:"0.3em",color:"var(--text)",textTransform:"uppercase"}}>Pinnacle</div>
          <button onClick={()=>nav("new")} style={{background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.7)",borderRadius:3,color:gold,fontSize:15,padding:"5px 12px",cursor:"pointer"}}>+</button>
        </div>
      )}
      {isMobile && menuOpen && <div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:29}} />}
      {/* SIDEBAR */}
      <div style={{width:isMobile?250:210,background:"var(--sidebar-bg)",borderRight:"1px solid rgba(201,168,76,0.26)",display:"flex",flexDirection:"column",flexShrink:0,position:"fixed",top:0,bottom:0,left:0,zIndex:30,transform:isMobile&&!menuOpen?"translateX(-105%)":"translateX(0)",transition:"transform 0.25s ease",overflowY:"auto",boxShadow:isMobile&&menuOpen?"4px 0 24px rgba(0,0,0,0.4)":"none"}}>
        <div style={{padding:"24px 20px 16px",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"}}>
          <svg width="36" height="36" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" style={{marginBottom:10}}>
            <polygon points="26,2 50,14 50,38 26,50 2,38 2,14" stroke="#c9a84c" strokeWidth="1.2" fill="none"/>
            <polygon points="26,8 44,17 44,35 26,44 8,35 8,17" stroke="#c9a84c" strokeWidth="0.6" fill="none" opacity="0.35"/>
            <polygon points="26,14 38,21 38,31 26,38 14,31 14,21" stroke="#c9a84c" strokeWidth="0.4" fill="none" opacity="0.18"/>
            <text x="26" y="31" textAnchor="middle" fontFamily="Cinzel,serif" fontSize="14" fontWeight="500" fill="#c9a84c">P</text>
          </svg>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:500,letterSpacing:"0.35em",color:"var(--text)",textTransform:"uppercase",lineHeight:1}}>Pinnacle</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontWeight:200,fontSize:7,letterSpacing:"0.45em",color:"#c9a84c",textTransform:"uppercase",marginTop:5}}>Luxury Automotive Group</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontWeight:300,fontSize:6.5,letterSpacing:"0.3em",color:"var(--muted)",textTransform:"uppercase",marginTop:4,padding:"2px 8px",border:"1px solid rgba(138,125,106,0.25)"}}>CRM</div>
        </div>
        <div style={{height:1,background:"rgba(201,168,76,0.26)",margin:"0 24px 20px"}} />
        <nav style={{padding:"0 12px",flex:1}}>
          {[["Dashboard","dashboard"],["My Numbers","sales"],["Clients","list"],["Quick Quote","quickquote"],["Sourcing ✦","source"],["AI Agent","agent"],["Inbox","inbox"],["Follow-Ups","followups"],["Inventory","inventory"],["Forms","forms"],["Recalls","recalls"],["Stores","stores"],["Appraisal","appraise"],["New Lead","new"]].map(([lbl,v])=>(
            <button key={v} data-nav={v} onClick={()=>nav(v)} style={{width:"100%",padding:"11px 13px",background:view===v?gold:"transparent",border:view===v?"1px solid "+goldBright:"1px solid transparent",borderRadius:3,color:view===v?goldInk:"var(--nav-text)",fontSize:13,fontWeight:view===v?500:400,letterSpacing:"0.16em",textTransform:"uppercase",textAlign:"left",marginBottom:4,cursor:"pointer",transition:"all 0.2s"}}
              onMouseEnter={e=>{if(view!==v){e.currentTarget.style.background="rgba(212,168,67,0.14)";e.currentTarget.style.color=goldBright;}}}
              onMouseLeave={e=>{if(view!==v){e.currentTarget.style.background="transparent";e.currentTarget.style.color="var(--nav-text)";}}}>
              {lbl}
            </button>
          ))}
        </nav>
        <div style={{padding:"16px 24px",borderTop:"1px solid rgba(201,168,76,0.22)"}}>
          <div style={{fontSize:9,letterSpacing:"0.35em",color:"var(--muted)",textTransform:"uppercase",marginBottom:10}}>Pipeline</div>
          {STAGES.map(s=>{
            const sc=STAGE_STYLE[s];
            return <div key={s} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:"var(--dim)"}}>{s}</span><span style={{fontSize:11,color:sc.color,fontWeight:500}}>{counts[s]||0}</span></div>;
          })}
        </div>
        <div style={{padding:"12px 20px 14px",borderTop:"1px solid rgba(201,168,76,0.18)"}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={()=>{setShowSettings(true);setMenuOpen(false);}} style={{flex:1,padding:"9px 10px",background:"rgba(212,168,67,0.16)",border:"1px solid "+gold,borderRadius:3,color:"var(--text)",fontSize:11,fontWeight:400,letterSpacing:"0.13em",textTransform:"uppercase",cursor:"pointer"}}>⚙ Settings</button>
            <button onClick={()=>sb.auth.signOut()} style={{flex:1,padding:"9px 10px",background:"transparent",border:"1px solid var(--nav-text)",borderRadius:3,color:"var(--nav-text)",fontSize:11,letterSpacing:"0.13em",textTransform:"uppercase",cursor:"pointer"}}>Sign Out</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:10,color:"var(--muted2)"}}>Pinnacle AI · v1.0</div>
            <button onClick={toggleDark} title={darkMode?"Switch to Light Mode":"Switch to Dark Mode"}
              style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",padding:"2px 0"}}>
              <span style={{fontSize:8,letterSpacing:"0.15em",color:"var(--dim)",textTransform:"uppercase"}}>{darkMode?"Light":"Dark"}</span>
              <div style={{width:30,height:16,borderRadius:8,background:darkMode?"rgba(201,168,76,0.3)":"rgba(0,0,0,0.12)",border:`1px solid ${darkMode?"rgba(201,168,76,0.6)":"rgba(0,0,0,0.2)"}`,position:"relative",transition:"all 0.25s",flexShrink:0}}>
                <div style={{position:"absolute",top:2,left:darkMode?12:2,width:10,height:10,borderRadius:"50%",background:darkMode?gold:"var(--dim)",transition:"left 0.25s"}} />
              </div>
            </button>
          </div>
        </div>
      </div>

      {/* MAIN */}
      {/* MOBILE BOTTOM TAB BAR */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:"var(--sidebar-bg)",borderTop:"1px solid rgba(201,168,76,0.34)",display:"flex",zIndex:25,paddingBottom:"env(safe-area-inset-bottom)"}}>
          {[["🏠","Home","dashboard"],["👥","Clients","list"],["🔎","Source","source"],["✦","Jessica","agent"],["☰","More","__menu"]].map(([icon,lbl,v])=>{
            const isActive = view===v;
            return (
              <button key={lbl} onClick={()=>{ if(v==="__menu"){setMenuOpen(true);} else {nav(v);} }}
                style={{flex:1,background:"transparent",border:"none",borderTop:isActive?"2px solid var(--gold)":"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,cursor:"pointer",padding:0}}>
                <span style={{fontSize:18,lineHeight:1,filter:isActive?"none":"grayscale(60%)",opacity:isActive?1:0.75}}>{icon}</span>
                <span style={{fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:isActive?gold:"var(--nav-text)",fontWeight:isActive?600:400}}>{lbl}</span>
              </button>
            );
          })}
        </div>
      )}

      <div style={{marginLeft:isMobile?0:210,padding:isMobile?"74px 16px 90px":"40px 48px",flex:1,minHeight:"100vh",maxWidth:"100vw",overflowX:"hidden"}}>
        {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} />}
        {view==="list" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:28}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>All Clients</div>
              <h1 style={{fontSize:30,color:"var(--text)"}}>Client Roster</h1>
            </div>
            <button onClick={()=>nav("new")} style={{padding:"12px 24px",background:gold,border:"1px solid "+goldBright,borderRadius:3,color:goldInk,fontSize:12,fontWeight:500,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer"}}>+ New Lead</button>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" style={{flex:1,minWidth:180,padding:"9px 14px",background:"var(--surface)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,fontFamily:"'Jost',sans-serif",fontWeight:300}} />
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["All",...STAGES].map(s=>(
                <button key={s} onClick={()=>setStageFilter(s)} style={{padding:"9px 14px",background:stageFilter===s?gold:"transparent",border:`1px solid ${stageFilter===s?goldBright:"var(--nav-text)"}`,borderRadius:3,color:stageFilter===s?goldInk:"var(--nav-text)",fontSize:11,fontWeight:stageFilter===s?500:400,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          {loading && <div style={{textAlign:"center",padding:"60px 0",color:"var(--dim3)"}}>Loading…</div>}
          {!loading && filtered.length===0 && <div style={{textAlign:"center",padding:"80px 0"}}><p style={{fontSize:14,color:"var(--muted)",lineHeight:1.8}}>{search||stageFilter!=="All"?"No clients match your search.":"No clients yet. Add your first lead."}</p></div>}
          {!loading && filtered.map(c=><Card key={c.id} client={c} onClick={()=>{setSelected(c);setView("detail");}} />)}
        </>}

        {view==="new" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:32}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>New Lead</div>
              <h1 style={{fontSize:30,color:"var(--text)"}}>Add Client</h1>
            </div>
            <ClientPDFImport onImport={(data)=>{setClientPrefill(data);setPrefillKey(k=>k+1);}} />
          </div>
          <ClientForm key={"new-"+prefillKey} initial={clientPrefill} onSave={handleSave} onCancel={()=>{nav("list");setClientPrefill(null);}} saving={saving} />
        </>}

        {view==="agent" && <AgentView />}
        {view==="dashboard" && <DashboardView clients={clients}
          onFilterStage={(s)=>{setStageFilter(s);nav("list");}}
          onFilterSource={(s)=>{setSearch(s);nav("list");}}
          onSelectClient={(c)=>{setSelected(c);setView("detail");}}
        />}
        {view==="inbox" && <JessicaInbox onPushToClient={(d)=>{setView("new"); window._prefill=d;}} />}
        {view==="followups" && <FollowUpsView clients={clients} />}
        {view==="inventory" && <InventoryView clients={clients} />}
        {view==="forms" && <FormsView />}
        {view==="quickquote" && <QuickQuoteView />}
        {view==="recalls" && <RecallMonitorView />}
        {view==="stores" && <StoreInventoryView clients={clients} />}
        {view==="source" && <SourcingView onNewLead={(want)=>{ setClientPrefill({vehicle_of_interest: want, stage:"New Lead"}); setView("new"); }} />}
        {view==="appraise" && <AppraisalView />}
        {view==="sales" && <SalesView />}
        {view==="detail" && selected && <Detail client={selected} onBack={()=>nav("list")} onEdit={()=>setView("edit")} onDelete={handleDelete} onQuickUpdate={handleQuickUpdate} />}

        {view==="edit" && selected && <>
          <div style={{marginBottom:32}}>
            <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>Editing</div>
            <h1 style={{fontSize:30,color:"var(--text)"}}>{selected.first_name} {selected.last_name}</h1>
          </div>
          <ClientForm initial={selected} onSave={handleSave} onCancel={()=>setView("detail")} saving={saving} />
        </>}
      </div>
    </div>
  );
}

// ── AUTH GATE ──────────────────────────────────────────────────────
function AuthRoot() {
  const [session, setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({data}) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  if (session === undefined) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:12,letterSpacing:"0.3em",textTransform:"uppercase"}}>Pinnacle…</div>
  );
  if (!session) return <LoginScreen />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthRoot />);
</script>
</body>
</html>
