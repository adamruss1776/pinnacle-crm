// ── FOLLOW-UPS ─────────────────────────────────────────────────────
function FollowUpsView({clients}) {
  const [drafting, setDrafting] = React.useState(null);
  const [draft, setDraft] = React.useState(null);
  const [generating, setGenerating] = React.useState(false);
  const now = new Date();
  const leads = clients.filter(c=>c.stage!=="Closed"&&c.stage!=="Lost").map(c=>{
    const d=Math.floor((now-new Date(c.created_at))/86400000);
    const u=d>=10?{label:"10+ days — Final reach out",color:"#fca5a5"}:d>=5?{label:"5-9 days — Create urgency",color:"#fcd34d"}:d>=2?{label:"2-4 days — Warm check-in",color:"#6fcf97"}:null;
    return {...c,days:d,urgency:u};
  }).filter(c=>c.urgency).sort((a,b)=>b.days-a.days);

  const gen = async(c)=>{
    setDrafting(c); setGenerating(true); setDraft(null);
    const tone=c.days>=10?"final warm reach out, keep door open":c.days>=5?"gentle urgency, vehicle may not last":"warm check-in";
    try {
      const res=await fetch("/.netlify/functions/jessica",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:"You are Jessica, AI sales agent. Draft a follow-up email. Tone: "+tone+". 3-4 sentences max. Warm, never pushy. Return ONLY raw JSON no backticks: {\"subject\":\"...\",\"body\":\"...\"}",messages:[{role:"user",content:"Follow-up for: "+c.first_name+" "+c.last_name+", Vehicle: "+(c.vehicle_of_interest||"luxury vehicle")+", Days: "+c.days+". Sign off: Adam Russell, Luxury Sales Advisor, Pinnacle CRM, adam@pinnaclecrm.ai"}]})});
      const data=await res.json();
      const text=(data.content?.[0]?.text||"{}").replace(/^```[\w]*\n?/,"").replace(/\n?```$/,"").trim();
      setDraft(JSON.parse(text));
    } catch(e){setDraft({subject:"Follow-up",body:"Error: "+e.message});}
    setGenerating(false);
  };

  return (
    <div style={{maxWidth:800}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:4}}>Sequences</div>
        <h1 style={{fontSize:28,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Follow-Ups</h1>
      </div>
      {leads.length===0?(
        <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:4,padding:40,textAlign:"center"}}>
          <div style={{fontSize:20,marginBottom:6}}>All caught up!</div>
          <div style={{fontSize:12,color:"var(--dim2)"}}>No leads need follow-up right now</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {leads.map(c=>(
            <div key={c.id} style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:4,padding:"14px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:14,color:"var(--text)"}}>{c.first_name} {c.last_name}</span>
                    <span style={{fontSize:8,color:c.urgency.color,border:"1px solid "+c.urgency.color+"44",padding:"2px 6px",borderRadius:2,textTransform:"uppercase",letterSpacing:"0.15em"}}>{c.urgency.label}</span>
                  </div>
                  <div style={{fontSize:11,color:gold,marginBottom:2}}>{c.vehicle_of_interest||"—"}</div>
                  <div style={{fontSize:10,color:"var(--dim2)"}}>{c.days} days since added</div>
                </div>
                <button onClick={()=>gen(c)} style={{padding:"7px 14px",background:"rgba(201,168,76,0.18)",border:"1px solid rgba(201,168,76,0.55)",borderRadius:3,color:gold,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer",whiteSpace:"nowrap"}}>Draft Email</button>
              </div>
              {drafting&&drafting.id===c.id&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(201,168,76,0.18)"}}>
                  {generating?(
                    <div style={{display:"flex",gap:5,alignItems:"center",color:"var(--muted)",fontSize:12}}>
                      {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:gold,opacity:0.6,animation:"fadeUp 1.2s ease-in-out "+(i*0.2)+"s infinite"}} />)}
                      <span style={{marginLeft:4}}>Drafting...</span>
                    </div>
                  ):draft&&(
                    <div>
                      <div style={{marginBottom:8,padding:"8px 10px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:3,fontSize:12,color:"var(--text)"}}>{draft.subject}</div>
                      <textarea value={draft.body} onChange={e=>setDraft({...draft,body:e.target.value})} rows={4} style={{width:"100%",padding:"9px 10px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:3,color:"var(--text)",fontSize:12,lineHeight:1.6,resize:"vertical",fontFamily:"Jost,sans-serif",fontWeight:300,marginBottom:8}} />
                      <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                        <button onClick={()=>{setDrafting(null);setDraft(null);}} style={{padding:"6px 12px",background:"transparent",border:"1px solid var(--w08)",borderRadius:3,color:"var(--muted2)",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Dismiss</button>
                        <button onClick={()=>navigator.clipboard.writeText(draft.body)} style={{padding:"6px 12px",background:"transparent",border:"1px solid rgba(201,168,76,0.42)",borderRadius:3,color:gold,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Copy</button>
                        <button onClick={()=>window.open("mailto:"+c.primary_email+"?subject="+encodeURIComponent(draft.subject)+"&body="+encodeURIComponent(draft.body))} style={{padding:"6px 14px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Open in Mail</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── INVENTORY VIEW ──────────────────────────────────────────────────
function InventoryView({clients=[]}) {
  const [vehicles, setVehicles] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pinnacle_inventory') || '[]'); } catch { return []; }
  });
  const [showAdd, setShowAdd] = React.useState(false);
  const [editIdx, setEditIdx] = React.useState(null);
  const [notify, setNotify] = React.useState(null);
  const [notifyDraft, setNotifyDraft] = React.useState(null);
  const [generating, setGenerating] = React.useState(false);
  const [storeFilter, setStoreFilter] = React.useState('All');
  const [showImport, setShowImport] = React.useState(false);
  const [importData, setImportData] = React.useState([]);
  const [importStore, setImportStore] = React.useState('');
  const fileInputRef = React.useRef(null);
const priceDropRef = React.useRef(null);
  const [pdReport, setPdReport] = React.useState([]);
  const [showPdReport, setShowPdReport] = React.useState(false);  const emptyVehicle = {year:'',make:'',model:'',trim:'',vin:'',mileage:'',color:'',price:'',oldPrice:'',store:'',status:'Available',notes:''};
  const [form, setForm] = React.useState(emptyVehicle);

  // Dedup
  const [dupNotify, setDupNotify] = React.useState(null);

  const cleanDuplicates = () => {
    const seen = new Map();
    vehicles.forEach(v => {
      const key = v.vin && v.vin.trim().length > 6
        ? 'vin:' + v.vin.trim().toUpperCase()
        : 'nv:' + [v.year,v.make,v.model,v.trim].join('|').toLowerCase();
      if (seen.has(key)) {
        const prev = seen.get(key);
        const scoreOf = x => [x.year,x.make,x.model,x.trim,x.color,x.store,x.notes,x.vin].filter(Boolean).join('').length;
        if (scoreOf(v) > scoreOf(prev)) seen.set(key, v);
      } else {
        seen.set(key, v);
      }
    });
    const deduped = [...seen.values()];
    const removed = vehicles.length - deduped.length;
    if (removed > 0) { setVehicles(deduped); saveToLS(deduped); }
    setDupNotify(removed > 0 ? 'Removed ' + removed + ' duplicate' + (removed!==1?'s':'') : 'No duplicates found');
    setTimeout(() => setDupNotify(null), 3500);
  };

  // Smart Sync state
  const [showSync, setShowSync] = React.useState(false);
  const [syncStage, setSyncStage] = React.useState(null); // null | parsing | comparing | recalls | done
  const [syncReport, setSyncReport] = React.useState(null);
  const [recallProgress, setRecallProgress] = React.useState({done:0, total:0});
  const [dragOver, setDragOver] = React.useState(false);
  const syncFileRef = React.useRef(null);
  const [lastSyncTime, setLastSyncTime] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pinnacle_recall_results')||'{}').checkedAt || null; } catch { return null; }
  });

  const saveToLS = (list) => localStorage.setItem('pinnacle_inventory', JSON.stringify(list));

  const formatTimeAgo = (iso) => {
    const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins/60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs/24) + 'd ago';
  };

  const decodeVinsBatch = async (vins) => {
    const results = {};
    const unique = [...new Set(vins.filter(v => v && v.length >= 11))];
    for (let i = 0; i < unique.length; i += 50) {
      const batch = unique.slice(i, i+50);
      try {
        const res = await fetch('https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVINValuesBatch/', {
          method: 'POST',
          headers: {'Content-Type':'application/x-www-form-urlencoded'},
          body: 'DATA=' + encodeURIComponent(batch.join(';')) + '&format=json'
        });
        const data = await res.json();
        (data.Results || []).forEach(r => {
          if (r.VIN) results[r.VIN.trim().toUpperCase()] = {
            year:  r.ModelYear || '',
            make:  (r.Make || '').charAt(0).toUpperCase() + (r.Make||'').slice(1).toLowerCase(),
            model: r.Model  || '',
            trim:  r.Trim   || r.Series || ''
          };
        });
      } catch {}
    }
    return results;
  };

  const applySyncPriceDrops = (drops) => {
    let updated = [...vehicles];
    drops.forEach(item => {
      updated = updated.map((v, i) => i === item.vehicleIdx
        ? { ...v, oldPrice: String(item.oldPrice), price: String(item.newPrice) }
        : v);
    });
    setVehicles(updated); saveToLS(updated);
  };

  const runFullSync = (file) => {
    setSyncStage('parsing');
    setSyncReport(null);
    setRecallProgress({done:0, total:0});
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (json.length < 2) { setSyncStage(null); alert('File appears empty or has no data rows'); return; }
        const headers = json[0].map(h => String(h));
        const rows = json.slice(1).filter(r => r.some(c => c !== ''));
        const incoming = rows.map(row => {
          const rowObj = {}; headers.forEach((h,i) => { rowObj[h] = row[i]!==undefined ? String(row[i]) : ''; });
          return mapCols(headers, rowObj);
        });

        setSyncStage('comparing');
        await new Promise(r => setTimeout(r, 350));

        // Find new vehicles (by VIN, or year+make+model if no VIN)
        const newVehicles = incoming.filter(v => {
          if (v.vin && v.vin.length > 6) return !vehicles.some(ex => ex.vin && ex.vin.trim().toUpperCase() === v.vin.trim().toUpperCase());
          return !vehicles.some(ex => ex.year===v.year && ex.make===v.make && ex.model===v.model && ex.trim===v.trim);
        });

        // Detect price drops against existing inventory
        const priceDrops = [];
        incoming.forEach(v => {
          if (!v.vin || !v.price) return;
          const existing = vehicles.find(ex => ex.vin && ex.vin.trim().toUpperCase() === v.vin.trim().toUpperCase());
          if (!existing) return;
          const oldP = parseFloat(String(existing.price).replace(/[^0-9.]/g,''));
          const newP = parseFloat(String(v.price).replace(/[^0-9.]/g,''));
          if (!oldP || isNaN(newP) || newP >= oldP) return;
          priceDrops.push({
            vin: v.vin, name: [existing.year,existing.make,existing.model,existing.trim].filter(Boolean).join(' ') || v.vin,
            year: existing.year, make: existing.make, model: existing.model, trim: existing.trim, store: existing.store||'',
            oldPrice: oldP, newPrice: newP, drop: oldP-newP, pct: ((oldP-newP)/oldP*100).toFixed(1),
            vehicleIdx: vehicles.indexOf(existing), at: Date.now()
          });
        });

        // Build merged inventory (don't save yet — decode VINs first)
        const addedVehicles = newVehicles.map((v,i) => ({...v, id: Date.now()+i}));
        let mergedInventory = [...vehicles, ...addedVehicles];

        // VIN decode step — fill in Year/Make/Model for any vehicles missing those fields
        setSyncStage('decoding');
        const vinsToDecode = mergedInventory.filter(v => v.vin && v.vin.trim().length >= 11 && (!v.year || !v.make || !v.model));
        let decodedCount = 0;
        if (vinsToDecode.length > 0) {
          const decoded = await decodeVinsBatch(vinsToDecode.map(v => v.vin.trim()));
          mergedInventory = mergedInventory.map(v => {
            if (!v.vin) return v;
            const d = decoded[v.vin.trim().toUpperCase()];
            if (!d) return v;
            const hadMissing = !v.year || !v.make || !v.model;
            if (!hadMissing) return v;
            decodedCount++;
            return {...v, year: v.year||d.year, make: v.make||d.make, model: v.model||d.model, trim: v.trim||d.trim};
          });
        }
        setVehicles(mergedInventory);
        saveToLS(mergedInventory);

        // Remember price drops for Jessica's revival alerts (keeps 30 days)
        if (priceDrops.length > 0) {
          try {
            const prior = JSON.parse(localStorage.getItem('pinnacle_price_drops')||'[]');
            const cutoff = Date.now() - 30*86400000;
            const kept = prior.filter(d => d.at > cutoff && !priceDrops.some(n => n.vin === d.vin));
            localStorage.setItem('pinnacle_price_drops', JSON.stringify([...kept, ...priceDrops]));
          } catch {}
        }

        // Client matches: new arrivals that match a client's vehicle of interest
        const matches = [];
        if (clients.length > 0 && addedVehicles.length > 0) {
          addedVehicles.forEach(v => {
            const vehicleWords = [v.year,v.make,v.model].filter(Boolean).join(' ').toLowerCase().split(/\s+/);
            clients.forEach(c => {
              if (!c.vehicle_of_interest) return;
              const interest = c.vehicle_of_interest.toLowerCase();
              const hit = vehicleWords.filter(w => w.length > 3).some(w => interest.includes(w));
              if (hit) {
                const name = [c.first_name,c.last_name].filter(Boolean).join(' ').trim() || c.primary_email || 'Client';
                const veh = [v.year,v.make,v.model].filter(Boolean).join(' ');
                if (!matches.find(m => m.client===name && m.vehicle===veh))
                  matches.push({client: name, vehicle: veh, interest: c.vehicle_of_interest});
              }
            });
          });
        }

        setSyncStage('recalls');
        const vinsToCheck = mergedInventory.filter(v => v.vin && v.vin.trim().length >= 11);
        setRecallProgress({done:0, total:vinsToCheck.length});
        const recallResults = {};
        for (const v of vinsToCheck) {
          try {
            const res = await fetch('https://api.nhtsa.gov/recalls/vehicle?vin=' + v.vin.trim());
            const data = await res.json();
            recallResults[v.vin.trim()] = data.results || [];
          } catch { recallResults[v.vin.trim()] = []; }
          setRecallProgress(prev => ({...prev, done: prev.done+1}));
        }
        const recallCount = Object.values(recallResults).filter(r => r.length > 0).length;
        const checkedAt = new Date().toISOString();
        localStorage.setItem('pinnacle_recall_results', JSON.stringify({results: recallResults, checkedAt}));
        setLastSyncTime(checkedAt);

        setSyncReport({total: mergedInventory.length, newCount: addedVehicles.length, priceDrops, recallCount, recallResults, matches, decodedCount});
        setSyncStage('done');

      } catch(err) { setSyncStage(null); alert('Sync failed: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const save = () => {
    const updated = editIdx !== null
      ? vehicles.map((v,i) => i===editIdx ? form : v)
      : [...vehicles, {...form, id: Date.now()}];
    setVehicles(updated);
    saveToLS(updated);
    setShowAdd(false); setEditIdx(null); setForm(emptyVehicle);
  };

  const remove = (idx) => {
    const updated = vehicles.filter((_,i) => i!==idx);
    setVehicles(updated); saveToLS(updated);
  };

  const startEdit = (idx) => { setForm(vehicles[idx]); setEditIdx(idx); setShowAdd(true); };

  const generatePriceDropNotification = async (vehicle) => {
    setNotify(vehicle); setGenerating(true); setNotifyDraft(null);
    try {
      const res = await fetch("/.netlify/functions/jessica", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          system: `You are Jessica, AI sales agent for Pinnacle CRM. Draft a price drop notification email for a luxury vehicle. Be warm, exciting, create urgency without being pushy. Keep it to 4-5 sentences. Return ONLY raw JSON: {"subject":"...","body":"..."}. No backticks, no markdown.`,
          messages: [{role:"user", content:`Draft a price drop notification for:
Vehicle: ${vehicle.year} ${vehicle.make} ${vehicle.model} ${vehicle.trim}
Previous Price: $${Number(vehicle.oldPrice).toLocaleString()}
New Price: $${Number(vehicle.price).toLocaleString()}
Savings: $${(Number(vehicle.oldPrice)-Number(vehicle.price)).toLocaleString()}
Color: ${vehicle.color}  Mileage: ${vehicle.mileage}
Sign off as Adam Russell, Luxury Sales Advisor, Pinnacle CRM, adam@pinnaclecrm.ai`}]
        })
      });
      const data = await res.json();
      const text = (data.content?.[0]?.text||'{}').replace(/^```[\w]*\n?/m,'').replace(/\n?```$/m,'').trim();
      setNotifyDraft(JSON.parse(text));
    } catch(e) { setNotifyDraft({subject:'Price Drop Alert', body:'Could not generate draft: '+e.message}); }
    setGenerating(false);
  };

  const mapCols = (headers, rowObj) => {
    const find = (...keys) => {
      for (const k of keys) {
        const h = headers.find(h => h.toLowerCase().replace(/[\s_\-]/g,'').includes(k.toLowerCase().replace(/[\s_\-]/g,'')));
        if (h !== undefined && rowObj[h] !== undefined && rowObj[h] !== '') return String(rowObj[h]);
      }
      return '';
    };
    return {
      year: find('year','modelyear','yr'), make: find('make','brand','manufacturer'),
      model: find('model'), trim: find('trim','grade','level','package'),
      vin: find('vin','vehiclevin'), color: find('color','extcolor','exteriorcolor'),
      mileage: find('mileage','miles','odometer'),
      price: find('price','askingprice','saleprice','msrp','listprice','internetprice'),
      oldPrice: find('oldprice','originalprice','wasprice','previousprice'),
      store: find('store','location','dealer','dealership','branch','lot'),
      notes: find('notes','comments','description'), status:'Available'
    };
  };

  const handleFileImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (json.length < 2) { alert('File appears empty or has no data rows'); return; }
        const headers = json[0].map(h => String(h));
        const rows = json.slice(1).filter(r => r.some(c => c !== ''));
        const mapped = rows.map(row => {
          const rowObj = {}; headers.forEach((h,i) => { rowObj[h] = row[i] !== undefined ? String(row[i]) : ''; });
          return mapCols(headers, rowObj);
        });
        setImportData(mapped); setShowImport(true);
      } catch(err) { alert('Failed to parse file: ' + err.message); }
    };
    reader.readAsArrayBuffer(file); e.target.value = '';
  };

  const handlePriceDropFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (json.length < 2) { alert('File appears empty'); return; }
        const headers = json[0].map(h => String(h));
        const findCol = (...keys) => headers.find(h => keys.some(k => h.toLowerCase().replace(/[\s_\-]/g,'').includes(k.toLowerCase())));
        const vinCol   = findCol('vin','vehiclevin');
        const priceCol = findCol('price','askingprice','saleprice','internetprice','listprice','msrp');
        const yearCol  = findCol('year','modelyear','yr');
        const makeCol  = findCol('make','brand');
        const modelCol = findCol('model');
        if (!vinCol || !priceCol) { alert('Could not find VIN and Price columns in this file.'); return; }
        const rows = json.slice(1).filter(r => r.some(c => c !== ''));
        const drops = [];
        rows.forEach(row => {
          const rowObj = {}; headers.forEach((h,i) => { rowObj[h] = row[i] !== undefined ? String(row[i]) : ''; });
          const vin = rowObj[vinCol]?.trim();
          const newPriceRaw = rowObj[priceCol]?.replace(/[^0-9.]/g,'');
          if (!vin || !newPriceRaw) return;
          const newPrice = parseFloat(newPriceRaw);
          const existing = vehicles.find(v => v.vin && v.vin.trim().toUpperCase() === vin.toUpperCase());
          if (!existing) return;
          const oldPrice = parseFloat(String(existing.price).replace(/[^0-9.]/g,''));
          if (!oldPrice || isNaN(newPrice) || newPrice >= oldPrice) return;
          const drop = oldPrice - newPrice;
          const pct  = ((drop / oldPrice) * 100).toFixed(1);
          drops.push({
            vin,
            name: [existing.year || rowObj[yearCol], existing.make || rowObj[makeCol], existing.model || rowObj[modelCol], existing.trim].filter(Boolean).join(' ') || vin,
            oldPrice, newPrice, drop, pct, store: existing.store || '',
            vehicleIdx: vehicles.indexOf(existing)
          });
        });
        setPdReport(drops);
        setShowPdReport(true);
      } catch(err) { alert('Failed to parse file: ' + err.message); }
    };
    reader.readAsArrayBuffer(file); e.target.value = '';
  };
  const applyPriceDrop = (item) => {
    const updated = vehicles.map((v, i) => i === item.vehicleIdx
      ? { ...v, oldPrice: String(item.oldPrice), price: String(item.newPrice) }
      : v);
    setVehicles(updated); saveToLS(updated);
    setPdReport(prev => prev.filter(p => p.vin !== item.vin));
    if (pdReport.length <= 1) setShowPdReport(false);
  };
  const applyAllPriceDrops = () => {
    let updated = [...vehicles];
    pdReport.forEach(item => {
      updated = updated.map((v, i) => i === item.vehicleIdx
        ? { ...v, oldPrice: String(item.oldPrice), price: String(item.newPrice) }
        : v);
    });
    setVehicles(updated); saveToLS(updated);
    setPdReport([]); setShowPdReport(false);
  };
  const doImport = () => {
    const withStore = importData.map((v, i) => ({...v, store: v.store || importStore || '', id: Date.now() + i}));
    const updated = [...vehicles, ...withStore];
    setVehicles(updated); saveToLS(updated);
    setShowImport(false); setImportData([]); setImportStore('');
  };

  const s = (k,v) => setForm(f=>({...f,[k]:v}));
  const usedStores = [...new Set(vehicles.map(v => v.store || 'Unassigned').filter(Boolean))];
  const storeOptions = ['All', ...STORES.filter(st => usedStores.includes(st)), ...(usedStores.filter(st => !STORES.includes(st) && st !== 'Unassigned')), ...(usedStores.includes('Unassigned') ? ['Unassigned'] : [])];
  const filtered = storeFilter === 'All' ? vehicles : vehicles.filter(v => (v.store || 'Unassigned') === storeFilter);

  return (
    <div style={{maxWidth:860}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20}}>
        <div>
          <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>Inventory</div>
          <h1 style={{fontSize:30,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Vehicle Inventory</h1>
          {lastSyncTime && (
            <div style={{fontSize:10,color:"var(--dim2)",marginTop:4,letterSpacing:"0.06em"}}>
              Last synced {formatTimeAgo(lastSyncTime)}
              {vehicles.length > 0 && <span style={{color:"var(--dim3)"}}> · {vehicles.length} vehicles</span>}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleFileImport} style={{display:"none"}} />
          <input ref={priceDropRef} type="file" accept=".csv,.xlsx,.xls" onChange={handlePriceDropFile} style={{display:"none"}} />
          <input ref={syncFileRef} type="file" accept=".csv,.xlsx,.xls" onChange={e=>{const f=e.target.files[0];if(f){setShowSync(true);runFullSync(f);}e.target.value='';}} style={{display:"none"}} />
          <button onClick={cleanDuplicates} title="Find and remove duplicate vehicles" style={{padding:"10px 18px",background:"transparent",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--muted)",fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>Clean Dupes</button>
          <button onClick={()=>{setShowAdd(true);setForm(emptyVehicle);setEditIdx(null);}} style={{padding:"10px 18px",background:"transparent",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--muted)",fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>+ Add</button>
          <button onClick={()=>{setSyncStage(null);setSyncReport(null);setShowSync(true);}} style={{padding:"11px 24px",background:"rgba(201,168,76,0.3)",border:"1px solid rgba(201,168,76,0.55)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer",fontWeight:500}}>⟳ Smart Sync</button>
        </div>
      </div>

      {/* Dedup toast */}
      {dupNotify && (
        <div style={{marginBottom:14,padding:"11px 18px",background:"rgba(201,168,76,0.16)",border:"1px solid rgba(201,168,76,0.42)",borderRadius:4,fontSize:12,color:gold,display:"flex",alignItems:"center",gap:8}}>
          <span>✓</span><span>{dupNotify}</span>
        </div>
      )}

      {/* Store Filter */}
      {vehicles.length > 0 && storeOptions.length > 1 && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {storeOptions.map(st => (
            <button key={st} onClick={()=>setStoreFilter(st)} style={{padding:"6px 12px",background:storeFilter===st?"rgba(201,168,76,0.26)":"transparent",border:`1px solid ${storeFilter===st?"rgba(201,168,76,0.65)":"var(--w06)"}`,borderRadius:3,color:storeFilter===st?gold:"var(--nav-text)",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",cursor:"pointer"}}>
              {st}{st!=='All'?` (${vehicles.filter(v=>(v.store||'Unassigned')===st).length})`:''}
            </button>
          ))}
        </div>
      )}

      {/* CSV/Excel Import Preview */}
      {showImport && importData.length > 0 && (
        <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:4,padding:24,marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.35em",color:gold,textTransform:"uppercase",marginBottom:4}}>Import Preview</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>{importData.length} vehicles detected</div>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:9,letterSpacing:"0.25em",color:gold,textTransform:"uppercase",marginBottom:5}}>Assign to Store</div>
                <select value={importStore} onChange={e=>setImportStore(e.target.value)} style={{padding:"7px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:12,appearance:"none",WebkitAppearance:"none"}}>
                  <option value="">Use CSV store column</option>
                  {STORES.map(st=><option key={st} value={st}>{st}</option>)}
                </select>
              </div>
              <button onClick={()=>{setShowImport(false);setImportData([]);}} style={{padding:"8px 14px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:3,color:"var(--muted2)",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Cancel</button>
              <button onClick={doImport} style={{padding:"8px 20px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:3,color:gold,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Import {importData.length} Vehicles</button>
            </div>
          </div>
          <div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {importData.slice(0,10).map((v,i) => (
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:3,fontSize:12}}>
                <span style={{color:"var(--text)"}}>{v.year} {v.make} {v.model} {v.trim}</span>
                <div style={{display:"flex",gap:14,color:"var(--muted)"}}>
                  {v.vin && <span>VIN: {v.vin}</span>}
                  {v.price && <span style={{color:gold}}>${Number(v.price).toLocaleString()}</span>}
                  {(v.store||importStore) && <span>{v.store||importStore}</span>}
                </div>
              </div>
            ))}
            {importData.length > 10 && <div style={{fontSize:11,color:"var(--dim2)",textAlign:"center",padding:8}}>…and {importData.length-10} more</div>}
          </div>
        </div>
      )}

      {/* Add/Edit Form */}
      {showAdd && (
        <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:4,padding:24,marginBottom:24}}>
          <div style={{fontSize:10,letterSpacing:"0.35em",color:gold,textTransform:"uppercase",marginBottom:16}}>{editIdx!==null?'Edit Vehicle':'New Vehicle'}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            {[['Year','year'],['Make','make'],['Model','model'],['Trim','trim'],['Color','color'],['VIN','vin']].map(([lbl,key])=>(
              <div key={key}>
                <div style={{fontSize:9,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:5}}>{lbl}</div>
                <input value={form[key]} onChange={e=>s(key,e.target.value)} style={{width:"100%",padding:"9px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13}} />
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            {[['Mileage','mileage'],['Current Price ($)','price'],['Previous Price ($)','oldPrice']].map(([lbl,key])=>(
              <div key={key}>
                <div style={{fontSize:9,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:5}}>{lbl}</div>
                <input value={form[key]} onChange={e=>s(key,e.target.value)} type="number" style={{width:"100%",padding:"9px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13}} />
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,marginBottom:12}}>
            <div>
              <div style={{fontSize:9,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:5}}>Store Location</div>
              <div style={{position:"relative"}}>
                <select value={form.store} onChange={e=>s('store',e.target.value)} style={{width:"100%",padding:"9px 32px 9px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:form.store?"var(--text)":"var(--muted2)",fontSize:13,appearance:"none",WebkitAppearance:"none"}}>
                  <option value="">Select store…</option>
                  {STORES.map(st=><option key={st} value={st}>{st}</option>)}
                </select>
                <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:gold,fontSize:9,pointerEvents:"none"}}>▾</div>
              </div>
            </div>
            <div>
              <div style={{fontSize:9,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:5}}>Notes</div>
              <textarea value={form.notes} onChange={e=>s('notes',e.target.value)} rows={1} style={{width:"100%",padding:"9px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,resize:"vertical",fontFamily:"'Jost',sans-serif",fontWeight:300}} />
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={()=>{setShowAdd(false);setEditIdx(null);}} style={{padding:"9px 20px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:3,color:"var(--muted2)",fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>Cancel</button>
            <button onClick={save} style={{padding:"9px 22px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>Save Vehicle</button>
          </div>
        </div>
      )}

      {/* Vehicle List */}
      {filtered.length === 0 ? (
        <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:4,padding:48,textAlign:"center",color:"var(--dim2)",fontSize:13}}>
          {vehicles.length === 0 ? "No vehicles in inventory yet — add one above or import a CSV/Excel file." : "No vehicles match the selected store filter."}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {filtered.map((v,i)=>{
            const actualIdx = vehicles.indexOf(v);
            return (
              <div key={v.id||i} style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:4,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:15,color:"var(--text)"}}>{v.year} {v.make} {v.model} {v.trim}</span>
                    {v.store && <span style={{fontSize:9,color:"var(--muted)",border:"1px solid rgba(138,125,106,0.25)",padding:"1px 6px",borderRadius:2,textTransform:"uppercase",letterSpacing:"0.12em",whiteSpace:"nowrap"}}>{v.store.replace('Pinnacle ','')}</span>}
                  </div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{v.color} · {v.mileage?Number(v.mileage).toLocaleString()+' mi':''} · VIN: {v.vin||'—'}</div>
                </div>
                <div style={{textAlign:"right",minWidth:120}}>
                  <div style={{fontSize:18,color:gold,fontFamily:"'Cormorant Garamond',serif"}}>${Number(v.price||0).toLocaleString()}</div>
                  {v.oldPrice && Number(v.oldPrice) > Number(v.price) && (
                    <div style={{fontSize:11,color:"#fca5a5",textDecoration:"line-through"}}>${Number(v.oldPrice).toLocaleString()}</div>
                  )}
                </div>
                <div style={{display:"flex",gap:8}}>
                  {v.oldPrice && Number(v.oldPrice) > Number(v.price) && (
                    <button onClick={()=>generatePriceDropNotification(v)} style={{padding:"7px 14px",background:"rgba(252,211,77,0.08)",border:"1px solid rgba(252,211,77,0.25)",borderRadius:3,color:"#fcd34d",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>↓ Notify</button>
                  )}
                  <button onClick={()=>startEdit(actualIdx)} style={{padding:"7px 14px",background:"transparent",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:gold,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Edit</button>
                  <button onClick={()=>remove(actualIdx)} style={{padding:"7px 14px",background:"transparent",border:"1px solid rgba(252,165,165,0.2)",borderRadius:3,color:"#fca5a5",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Smart Sync Modal */}
      {showSync && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.82)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:8,width:"100%",maxWidth:520,overflow:"hidden"}}>

            {/* Modal header */}
            <div style={{padding:"18px 24px",borderBottom:"1px solid rgba(201,168,76,0.22)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:9,letterSpacing:"0.45em",color:gold,textTransform:"uppercase",marginBottom:3}}>Inventory</div>
                <div style={{fontSize:16,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Smart Sync</div>
              </div>
              {!syncStage && <button onClick={()=>setShowSync(false)} style={{background:"none",border:"none",color:"var(--muted2)",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>}
            </div>

            {/* Drop zone — initial state */}
            {!syncStage && (
              <div style={{padding:24}}>
                <div
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f){runFullSync(f);}}}
                  onClick={()=>syncFileRef.current?.click()}
                  style={{border:`2px dashed ${dragOver?"rgba(201,168,76,0.75)":"rgba(201,168,76,0.28)"}`,borderRadius:6,padding:"44px 20px",textAlign:"center",cursor:"pointer",background:dragOver?"rgba(201,168,76,0.04)":"transparent",transition:"all 0.2s"}}
                >
                  <div style={{fontSize:26,color:gold,marginBottom:10}}>↑</div>
                  <div style={{fontSize:17,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif",marginBottom:6}}>Drop your DMS export here</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginBottom:18}}>or click to browse · CSV or Excel</div>
                  <div style={{fontSize:10,color:"var(--dim2)",lineHeight:1.8,letterSpacing:"0.04em"}}>
                    Syncs inventory &nbsp;·&nbsp; detects price drops &nbsp;·&nbsp; checks NHTSA recalls &nbsp;·&nbsp; matches waiting clients
                  </div>
                </div>
                <div style={{marginTop:20,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {icon:"↕","label":"New & removed vehicles detected automatically"},
                    {icon:"📉","label":"Price drops identified — apply in one click"},
                    {icon:"⚠","label":"Every VIN checked against NHTSA in real time"},
                    {icon:"★","label":"New arrivals matched to clients on your radar"}
                  ].map(item=>(
                    <div key={item.label} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"10px 12px",background:"var(--w03)",borderRadius:4,border:"1px solid rgba(201,168,76,0.16)"}}>
                      <span style={{color:gold,fontSize:13,minWidth:16}}>{item.icon}</span>
                      <span style={{fontSize:11,color:"var(--muted)",lineHeight:1.5}}>{item.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Progress stages */}
            {(syncStage==='parsing'||syncStage==='comparing'||syncStage==='decoding'||syncStage==='recalls') && (
              <div style={{padding:"28px 28px"}}>
                {[
                  {key:'parsing',   label:'Parsing file',
                   sub: syncStage!=='parsing'  ? 'Complete' : 'Reading your DMS export…'},
                  {key:'comparing', label:'Comparing inventory',
                   sub: ['decoding','recalls','done'].includes(syncStage) ? 'Complete' : syncStage==='comparing' ? 'Checking for new vehicles and price changes…' : ''},
                  {key:'decoding',  label:'Filling in vehicle details',
                   sub: syncStage==='recalls'||syncStage==='done' ? 'Complete' : syncStage==='decoding' ? 'Decoding VINs via NHTSA…' : ''},
                  {key:'recalls',   label:'Checking NHTSA recalls',
                   sub: syncStage==='recalls' && recallProgress.total>0 ? recallProgress.done+' / '+recallProgress.total+' VINs' : syncStage==='recalls' ? 'Connecting to NHTSA…' : ''}
                ].map((step,si)=>{
                  const order = ['parsing','comparing','decoding','recalls'];
                  const stepIdx = order.indexOf(step.key);
                  const curIdx  = order.indexOf(syncStage);
                  const done    = stepIdx < curIdx;
                  const active  = stepIdx === curIdx;
                  return (
                    <div key={step.key} style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:18}}>
                      <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${done?gold:active?"rgba(201,168,76,0.6)":"rgba(201,168,76,0.26)"}`,background:done?"rgba(201,168,76,0.22)":"transparent",marginTop:1}}>
                        {done  ? <span style={{color:gold,fontSize:11}}>✓</span>
                               : active ? <div style={{width:10,height:10,border:`2px solid ${gold}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}} />
                               : <span style={{color:"var(--dim3)",fontSize:10}}>{si+1}</span>}
                      </div>
                      <div style={{flex:1,paddingTop:2}}>
                        <div style={{fontSize:13,color:active||done?"var(--text)":"var(--dim2)",marginBottom:3}}>{step.label}</div>
                        {step.sub && <div style={{fontSize:11,color:active?gold:"var(--dim2)"}}>{step.sub}</div>}
                        {active && step.key==='recalls' && recallProgress.total>0 && (
                          <div style={{marginTop:8}}>
                            <div style={{height:2,background:"rgba(201,168,76,0.18)",borderRadius:1,overflow:"hidden"}}>
                              <div style={{height:"100%",background:gold,width:(recallProgress.done/recallProgress.total*100)+'%',transition:"width 0.25s ease"}} />
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Results card */}
            {syncStage==='done' && syncReport && (
              <div style={{padding:24}}>
                <div style={{textAlign:"center",paddingBottom:20,borderBottom:"1px solid rgba(201,168,76,0.18)",marginBottom:20}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:"rgba(110,231,183,0.12)",border:"1px solid rgba(110,231,183,0.3)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",fontSize:18,color:"#6ee7b7"}}>✓</div>
                  <div style={{fontSize:15,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Sync complete</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{syncReport.total} vehicles in inventory</div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>

                  {/* New arrivals + VIN decode */}
                  <div style={{padding:"13px 16px",background:"var(--w03)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,color:"var(--text)"}}>{syncReport.newCount} new arrival{syncReport.newCount!==1?'s':''}</div>
                      <div style={{fontSize:10,color:"var(--dim2)",marginTop:2}}>
                        {syncReport.newCount>0 ? "Added to inventory" : "Inventory is current"}
                        {syncReport.decodedCount>0 && <span style={{color:gold}}> · {syncReport.decodedCount} VIN{syncReport.decodedCount!==1?'s':''} auto-decoded</span>}
                      </div>
                    </div>
                    <div style={{fontSize:11,color:syncReport.newCount>0||syncReport.decodedCount>0?"#6ee7b7":"var(--dim3)"}}>
                      {syncReport.newCount>0||syncReport.decodedCount>0?"✓ Done":"—"}
                    </div>
                  </div>

                  {/* Price drops */}
                  <div style={{padding:"13px 16px",background:syncReport.priceDrops.length>0?"rgba(93,188,125,0.04)":"var(--w03)",border:`1px solid ${syncReport.priceDrops.length>0?"rgba(93,188,125,0.2)":"rgba(201,168,76,0.18)"}`,borderRadius:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,color:syncReport.priceDrops.length>0?"#6fcf97":"var(--text)"}}>
                        {syncReport.priceDrops.length} price drop{syncReport.priceDrops.length!==1?'s':''} detected
                      </div>
                      {syncReport.priceDrops.length>0 && (
                        <div style={{fontSize:10,color:"var(--dim2)",marginTop:2}}>
                          Avg reduction: ${Math.round(syncReport.priceDrops.reduce((s,p)=>s+p.drop,0)/syncReport.priceDrops.length).toLocaleString()}
                        </div>
                      )}
                    </div>
                    {syncReport.priceDrops.length>0 && (
                      <button onClick={()=>{applySyncPriceDrops(syncReport.priceDrops);setSyncReport({...syncReport,priceDrops:[]});}} style={{padding:"6px 14px",background:"rgba(93,188,125,0.1)",border:"1px solid rgba(93,188,125,0.35)",borderRadius:3,color:"#6fcf97",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer"}}>Apply All</button>
                    )}
                  </div>

                  {/* Recalls */}
                  <div style={{padding:"13px 16px",background:syncReport.recallCount>0?"rgba(252,165,165,0.04)":"var(--w03)",border:`1px solid ${syncReport.recallCount>0?"rgba(252,165,165,0.25)":"rgba(201,168,76,0.18)"}`,borderRadius:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,color:syncReport.recallCount>0?"#fca5a5":"var(--text)"}}>
                        {syncReport.recallCount>0 ? '⚠ '+syncReport.recallCount+' vehicle'+(syncReport.recallCount!==1?'s':'')+' with active recalls' : 'No active recalls found'}
                      </div>
                      {syncReport.recallCount>0 && <div style={{fontSize:10,color:"var(--dim2)",marginTop:2}}>Check Recalls tab for full details</div>}
                    </div>
                    {syncReport.recallCount>0 && <span style={{color:"#fca5a5",fontSize:13}}>!</span>}
                  </div>

                  {/* Client matches — the wow moment */}
                  {syncReport.matches.length>0 && (
                    <div style={{padding:"14px 16px",background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:4}}>
                      <div style={{fontSize:11,letterSpacing:"0.25em",color:gold,textTransform:"uppercase",marginBottom:10}}>★ Client matches — {syncReport.matches.length} waiting</div>
                      {syncReport.matches.map((m,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:i<syncReport.matches.length-1?8:0}}>
                          <div style={{width:24,height:24,borderRadius:"50%",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.42)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:9,color:gold,textTransform:"uppercase",fontWeight:500,letterSpacing:"0.05em"}}>
                            {m.client.split(' ').map(n=>n[0]).join('').slice(0,2)}
                          </div>
                          <div>
                            <div style={{fontSize:12,color:"var(--text)"}}>{m.client}</div>
                            <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>Looking for a <span style={{color:gold}}>{m.vehicle}</span></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div style={{display:"flex",justifyContent:"flex-end"}}>
                  <button onClick={()=>{setShowSync(false);setSyncStage(null);setSyncReport(null);}} style={{padding:"10px 28px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer"}}>Done</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Price Drop Notification Modal */}
      {notify && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:8,width:"100%",maxWidth:580,maxHeight:"85vh",overflow:"auto"}}>
            <div style={{padding:"20px 24px",borderBottom:"1px solid rgba(201,168,76,0.26)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,letterSpacing:"0.35em",color:gold,textTransform:"uppercase",marginBottom:4}}>Price Drop Alert</div>
                <div style={{fontSize:15,color:"var(--text)"}}>{notify.year} {notify.make} {notify.model} — ${Number(notify.price).toLocaleString()}</div>
              </div>
              <button onClick={()=>{setNotify(null);setNotifyDraft(null);}} style={{background:"none",border:"none",color:"var(--muted2)",fontSize:18,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{padding:24}}>
              {generating && (
                <div style={{textAlign:"center",padding:"32px 0"}}>
                  <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>
                    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:gold,animation:`fadeUp 1.2s ease-in-out ${i*0.2}s infinite`,opacity:0.6}} />)}
                  </div>
                  <div style={{fontSize:13,color:"var(--muted)"}}>Jessica is drafting your notification…</div>
                </div>
              )}
              {notifyDraft && !generating && (
                <div>
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:10,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:8}}>Subject</div>
                    <div style={{padding:"11px 14px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,fontSize:14,color:"var(--text)"}}>{notifyDraft.subject}</div>
                  </div>
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:10,letterSpacing:"0.3em",color:gold,textTransform:"uppercase",marginBottom:8}}>Email Body</div>
                    <textarea value={notifyDraft.body} onChange={e=>setNotifyDraft({...notifyDraft,body:e.target.value})} rows={8} style={{width:"100%",padding:"12px 14px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,lineHeight:1.7,resize:"vertical",fontFamily:"'Jost',sans-serif",fontWeight:300}} />
                    <div style={{fontSize:11,color:"var(--dim2)",marginTop:5}}>Edit before sending. This goes to all clients who enquired about this vehicle.</div>
                  </div>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                    <button onClick={()=>generatePriceDropNotification(notify)} style={{padding:"9px 18px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:3,color:"var(--muted2)",fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>↺ Regenerate</button>
                    <button onClick={()=>{navigator.clipboard.writeText(notifyDraft.body);}} style={{padding:"9px 18px",background:"transparent",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>Copy</button>
                    <button onClick={()=>window.open(`mailto:?subject=${encodeURIComponent(notifyDraft.subject)}&body=${encodeURIComponent(notifyDraft.body)}`)} style={{padding:"9px 22px",background:"rgba(201,168,76,0.26)",border:"1px solid rgba(201,168,76,0.65)",borderRadius:3,color:gold,fontSize:12,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"pointer"}}>Open in Mail ↗</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
      {/* Price Drop Report Modal */}
      {showPdReport && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"var(--surface)",borderRadius:6,padding:28,width:"100%",maxWidth:680,maxHeight:"80vh",overflowY:"auto",border:"1px solid rgba(201,168,76,0.34)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:4}}>Inventory Analysis</div>
                <h2 style={{fontSize:22,fontFamily:"'Cormorant Garamond',serif",color:"var(--text)"}}>Price Drop Report</h2>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{pdReport.length} vehicle{pdReport.length!==1?"s":""} with price reductions found</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={applyAllPriceDrops} style={{padding:"8px 16px",background:"rgba(110,231,183,0.15)",border:"1px solid rgba(110,231,183,0.4)",borderRadius:3,color:"#6fcf97",fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>Apply All</button>
                <button onClick={()=>setShowPdReport(false)} style={{padding:"8px 16px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--muted)",fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",cursor:"pointer"}}>Close</button>
              </div>
            </div>
            {pdReport.length === 0
              ? <div style={{textAlign:"center",color:"var(--muted)",padding:32}}>No price drops found — all prices are current.</div>
              : <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {pdReport.map((item,i)=>{
                    const nameLc = (item.name||'').toLowerCase();
                    const interested = clients.filter(c => {
                      if (!c.vehicle_of_interest || ['Closed','Lost'].includes(c.stage)) return false;
                      const kws = c.vehicle_of_interest.toLowerCase().split(/\s+/).filter(w => w.length > 3 && !/^\d+$/.test(w));
                      return kws.some(k => nameLc.includes(k));
                    });
                    const alertBody = (c) => `Great news ${c.first_name||''}! The ${item.name} you were interested in just dropped from $${item.oldPrice.toLocaleString()} to $${item.newPrice.toLocaleString()} — that's $${item.drop.toLocaleString()} off. Want to come take a look before it's gone?`;
                    return (
                    <div key={i} style={{background:"var(--bg)",border:"1px solid rgba(110,231,183,0.15)",borderRadius:4,padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,color:"var(--text)",marginBottom:4}}>{item.name}</div>
                          <div style={{fontSize:11,color:"var(--dim2)"}}>VIN: {item.vin}{item.store ? " · " + item.store : ""}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:13,color:"var(--muted2)",textDecoration:"line-through"}}>${item.oldPrice.toLocaleString()}</div>
                          <div style={{fontSize:15,color:"#6fcf97",fontWeight:500}}>${item.newPrice.toLocaleString()}</div>
                          <div style={{fontSize:11,color:"#6fcf97",marginTop:2}}>▼ ${item.drop.toLocaleString()} ({item.pct}%)</div>
                        </div>
                        <button onClick={()=>applyPriceDrop(item)} style={{padding:"7px 14px",background:"rgba(110,231,183,0.1)",border:"1px solid rgba(110,231,183,0.3)",borderRadius:3,color:"#6fcf97",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",cursor:"pointer",flexShrink:0}}>Apply</button>
                      </div>
                      {interested.length > 0 && (
                        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(201,168,76,0.22)"}}>
                          <div style={{fontSize:10,letterSpacing:"0.25em",color:gold,textTransform:"uppercase",marginBottom:8}}>🔔 {interested.length} interested client{interested.length!==1?'s':''} — notify:</div>
                          <div style={{display:"flex",flexDirection:"column",gap:6}}>
                            {interested.map(c => (
                              <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                                <span style={{fontSize:13,color:"var(--text)",flex:1,minWidth:120}}>{c.first_name} {c.last_name}<span style={{fontSize:11,color:"var(--dim2)",marginLeft:8}}>{c.vehicle_of_interest}</span></span>
                                {c.cell && !c.do_not_text
                                  ? <a href={smsHref(c.cell, alertBody(c))} style={{padding:"6px 14px",background:"rgba(201,168,76,0.22)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:3,color:gold,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",textDecoration:"none"}}>💬 Text</a>
                                  : <span style={{fontSize:10,color:"var(--dim2)",padding:"6px 10px"}}>{c.do_not_text?'DNT':'no cell'}</span>}
                                {c.primary_email && !c.do_not_email
                                  ? <a href={`mailto:${c.primary_email}?subject=${encodeURIComponent('Price Drop — '+item.name)}&body=${encodeURIComponent(alertBody(c))}`} style={{padding:"6px 14px",background:"rgba(201,168,76,0.16)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:3,color:gold,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",textDecoration:"none"}}>✉ Email</a>
                                  : <span style={{fontSize:10,color:"var(--dim2)",padding:"6px 10px"}}>{c.do_not_email?'DNE':'no email'}</span>}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );})}
                </div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ── APPRAISAL VIEW ──────────────────────────────────────────────────
function AppraisalView() {
  const [step, setStep] = React.useState(1);
  const [form, setForm] = React.useState(() => {
    try {
      const saved = JSON.parse(sessionStorage.getItem('pinnacle_trade_prefill') || 'null');
      if (saved) { sessionStorage.removeItem('pinnacle_trade_prefill'); return saved; }
    } catch {}
    return { year:'', make:'', model:'', trim:'', mileage:'', condition:'Good', accidents:'No', owners:'1', zip:'', carfaxNotes:'' };
  });
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  const conditions = ['Excellent','Good','Fair','Poor'];
  const [vin, setVin] = React.useState('');
  const [vinLoading, setVinLoading] = React.useState(false);
  const [vinError, setVinError] = React.useState('');
  const s = (k,v) => setForm(f=>({...f,[k]:v}));

  const decodeVin = async () => {
    if (!vin || vin.length !== 17) { setVinError('VIN must be exactly 17 characters'); return; }
    setVinLoading(true); setVinError('');
    try {
      const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
      const data = await res.json();
      const get = (var_) => data.Results?.find(r => r.Variable === var_)?.Value || '';
      const year = get('Model Year');
      const make = get('Make');
      const model = get('Model');
      const trim = get('Trim') || get('Series') || '';
      if (!year || !make || !model) { setVinError('Could not decode VIN — please check and try again'); setVinLoading(false); return; }
      s('year', year); s('make', make); s('model', model); s('trim', trim);
      setVinError('');
    } catch(e) { setVinError('Decode failed — check your connection'); }
    setVinLoading(false);
  };

  const runAppraisal = async () => {
    setLoading(true);
    setResult(null);
    try {
      const res = await fetch("/.netlify/functions/jessica", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          system: `You are Jessica, a luxury automotive appraisal specialist for Pinnacle CRM. You have deep knowledge of current market values for luxury and exotic vehicles. Use your knowledge of current market conditions, depreciation curves, and comparable sales to give a precise, credible trade-in appraisal range. Be confident and specific. Return ONLY raw JSON with no backticks: {"trade_in_low": number, "trade_in_high": number, "retail_low": number, "retail_high": number, "summary": "2-3 sentence explanation", "factors": ["factor1","factor2","factor3"], "recommendation": "one sentence advice for the dealer"}`,
          messages: [{role:"user", content:`Appraise this vehicle:
Year: ${form.year}
Make: ${form.make}
Model: ${form.model}
Trim: ${form.trim}
Mileage: ${form.mileage}
Condition: ${form.condition}
Accident History: ${form.accidents}
Previous Owners: ${form.owners}
Customer ZIP: ${form.zip}
Carfax/Additional Notes: ${form.carfaxNotes||'None provided'}

Provide current market trade-in range and retail range based on real market data for this vehicle.`}]
        })
      });
      const data = await res.json();
      const text = (data.content?.[0]?.text||'{}').replace(/^```[\w]*\n?/m,'').replace(/\n?```$/m,'').trim();
      setResult(JSON.parse(text));
      setStep(3);
    } catch(e) { alert('Appraisal failed: '+e.message); }
    setLoading(false);
  };

  return (
    <div style={{maxWidth:680}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"0.4em",color:gold,textTransform:"uppercase",marginBottom:6}}>Appraisal Tool</div>
        <h1 style={{fontSize:30,color:"var(--text)",fontFamily:"'Cormorant Garamond',serif"}}>Vehicle Appraisal</h1>
      </div>

      {/* Step indicators */}
      <div style={{display:"flex",gap:0,marginBottom:28}}>
        {[['1','Vehicle Info'],['2','History'],['3','Results']].map(([n,lbl],i)=>(
          <div key={n} style={{display:"flex",alignItems:"center",gap:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:step===i+1?"rgba(201,168,76,0.22)":"transparent",border:`1px solid ${step===i+1?"rgba(201,168,76,0.6)":"rgba(201,168,76,0.18)"}`,borderRadius:3}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:step>i?"rgba(201,168,76,0.5)":"var(--w05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:step>i?gold:"var(--dim2)"}}>{n}</div>
              <span style={{fontSize:11,color:step===i+1?gold:"var(--dim2)",letterSpacing:"0.15em",textTransform:"uppercase"}}>{lbl}</span>
            </div>
            {i<2 && <div style={{width:20,height:1,background:"rgba(201,168,76,0.26)"}} />}
          </div>
        ))}
      </div>

      {step===1 && (
        <div style={{background:"var(--surface)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:4,padding:24}}>
          <div style={{fontSize:10,letterSpacing:"0.35em",color:gold,textTransform:"uppercase",marginBottom:16}}>Vehicle Details</div>
          
          {/* VIN Decoder */}
          <div style={{marginBottom:20,padding:16,background:"rgba(201,168,76,0.04)",border:"1px solid rgba(201,168,76,0.26)",borderRadius:3}}>
            <div style={{fontSize:9,letterSpacing:"0.35em",color:gold,textTransform:"uppercase",marginBottom:8}}>VIN Decoder — Auto-Fill</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={vin} onChange={e=>setVin(e.target.value.toUpperCase())} maxLength={17} placeholder="Enter 17-character VIN..." style={{flex:1,padding:"9px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,letterSpacing:"0.05em",fontFamily:"monospace"}} />

            <textarea value={form.carfaxNotes} onChange={e=>s('carfaxNotes',e.target.value)} rows={3} placeholder="e.g. Clean title, 2 owners, last serviced at dealer 6 months ago..." style={{width:"100%",padding:"10px 12px",background:"var(--bg)",border:"1px solid rgba(201,168,76,0.34)",borderRadius:3,color:"var(--text)",fontSize:13,resize:"vertical",fontFamily:"'Jost',sans-serif",fontWeight:300}} />
